sonar.projectKey=FactusConsulting_whisper-dictate
sonar.organization=factusconsulting

# Keep sources and tests disjoint — a path in both lists makes the scanner fail
# with "can't be indexed twice" (the test dirs live under src/). The Rust crate
# is now flat under src/rust, so its integration tests (src/rust/tests) sit
# inside the source root and are carved back out via sonar.exclusions below.
sonar.sources=src/python/whisper_dictate,src/rust,scripts,packaging,nix
sonar.tests=src/tests,src/python/tests,src/rust/tests
sonar.python.version=3.12
sonar.rust.cargo.manifestPaths=src/rust/Cargo.toml
# Rust analysis runs as CI-based analysis (Rust is not eligible for SonarCloud
# Automatic Analysis). Import Clippy lints from the JSON report produced in
# sonar.yml instead of letting the analyzer re-run Clippy (avoids duplicates).
sonar.rust.clippy.enabled=false
sonar.rust.clippyReport.reportPaths=clippy-report.json

# Coverage reports are generated in sonar.yml and imported here. Both use
# repo-root-relative source paths so Sonar maps them onto sonar.sources:
#   - Python: coverage.py XML (<source> = repo root, filename = src/python/...).
#   - Rust: cargo-llvm-cov LCOV, path-normalized to repo root in sonar.yml.
sonar.python.coverage.reportPaths=coverage.xml
sonar.rust.lcov.reportPaths=lcov.info

sonar.exclusions=target/**,Output/**,__pycache__/**,.venv*/**,.codex-test-venv/**,*.egg-info/**,src/rust/tests/**

# Structurally repetitive by design, so copy-paste detection only produces
# false positives:
#   - text.rs: the localized-string catalogue (one match arm per key/language)
#   - benchmark_results.rs: per-status row mapping + many near-identical parse
#     test fixtures; tabs/benchmark_results.rs: per-row egui table cells.
#   - corpus_record.rs: same localized-string-catalogue shape as text.rs — the
#     english()/danish() methods each map every CorpusRecordText variant to its
#     string (one arm per key/language), not unit-testable logic.
#   - test_support.rs: the hermetic `test_app` builder lists every
#     WhisperDictateApp field, mirroring the `Default` struct literal in ui.rs.
#     It deliberately cannot reuse `Default::default()` (that does real config
#     I/O, keyring access and a GPU probe); the full-field literal is inherent.
#   - hotkey_supervisor_tests.rs / worker_command_tests.rs: runtime supervisor
#     unit tests. Each test independently acquires ENV_LOCK + sets up
#     EnvVarGuard stubs — this boilerplate repeats across every test because
#     Rust has no test-fixture support; the repetition is structural, not
#     accidental copy-paste.
sonar.cpd.exclusions=src/rust/ui/text.rs,src/rust/ui/benchmark_results.rs,src/rust/ui/tabs/benchmark_results.rs,src/rust/ui/corpus_record.rs,src/rust/ui/test_support.rs,src/rust/runtime/hotkey_supervisor_tests.rs,src/rust/runtime/worker_command_tests.rs,src/rust/whisper/model_manager_tests.rs,src/rust/whisper/wav_tests.rs,src/rust/whisper/local/local_tests.rs

# Coverage exclusions: code whose uncovered remainder is genuinely OS/IO/UI
# integration, not unit-testable business logic (the pure logic these wrap is
# covered by existing tests, e.g. api_key_env_tests / settings_reset_tests).
# Still analysed for bugs/smells/security — just not counted in coverage:
#   - egui immediate-mode UI rendering (tabs, widgets, previews, log, app, ui root)
#   - OS credential store / keyring (api_keys, secret_store)
#   - cloud STT / post-processing HTTP client (cloud_api): real network requests
#     to remote APIs, not unit-testable without a live/mock server; the pure
#     status/error formatting it wraps is exercised indirectly
#   - config-IO + credential-persistence app state (settings_state)
#   - background task / subprocess orchestration (tasks)
#   - process entrypoint (main)
#   - device/event hotkey loops + the Rust subprocess bridge (vp_keys, vp_rust)
#   - dictation event loop + audio/transcribe/inject pipeline (runtime, vp_dictate)
#   - developer/benchmark scripts
#   - egui palette/style/chrome painting (theme)
#   - localized-string catalogue (text.rs): pure data, one match arm per
#     (key, language) pair — not unit-testable logic (also cpd-excluded above)
#   - `models` CLI handler (whisper/models_cli.rs): a thin dispatcher around
#     `model_manager` plus the carriage-return stderr progress sink — same
#     "HTTP wrapper + terminal IO" shape as `cloud_api`. The pure formatting
#     helpers (`human_bytes`, `print_list`) keep their unit tests for
#     behaviour assertions; the coverage metric just doesn't count them so
#     the dispatcher's untestable terminal-IO branches don't drag the gate.
#   - rdev OS listener (hotkey/manager/rdev_driver.rs): the blocking
#     `rdev::listen` global key-event loop; requires a real OS display /
#     accessibility permission that headless CI containers never have. The
#     pure coordinator and tracker layers it wraps are unit-tested
#     independently (coordinator/tests.rs, manager/tracker.rs).
#   - whisper.cpp FFI inference (whisper/local/mod.rs): whisper-rs-local feature
#     gate requires CMake + C++ toolchain; the standard Sonar build omits this
#     feature so the file never appears in LCOV. Excluded so coverage-metric
#     new-code counts stay clean if the scanner ever sees the absent file.
#   - JSON-over-stdio dispatcher (whisper/dispatch.rs): same feature gate as
#     local/mod.rs (whisper-rs-local). The pure helpers it wraps — JSON parsing,
#     normalise_language / normalise_prompt — have their own tests wired in the
#     same file and compiled under the feature; excluded to keep the gate clean.
#   - Rust runtime supervisor (src/rust/runtime.rs): the subprocess-orchestrating
#     `RuntimeSupervisor` (start/stop/poll, audio bridge wiring, hotkey-handle
#     lifecycle, child exit handling). Mirrors the existing exclusion for the
#     Python counterpart (`src/python/whisper_dictate/runtime.py`) -- the
#     remaining uncovered branches need a failing `process.spawn()`, a failing
#     audio-bridge init, or a synthesized `BridgeError` to exercise, all of
#     which are OS/IO integration paths covered by the gated integration tests
#     in `runtime/bridge_terminal_tests.rs` (audio-in-rust feature) rather than
#     by the default Sonar build (--features ui-egui-glow). The pure logic
#     factored out of `runtime.rs` (audio_spawn helpers, install_plan helpers,
#     hotkey_supervisor module, process_capture helpers, rust_session_sink)
#     keeps its own unit tests so the supervisor's testable seams stay covered.
#   - Rust worker-rust subcommand entrypoint (src/rust/runtime/worker_rust.rs):
#     the long-running dictation subprocess entry (Wave 5 PR 6 of #348). Same
#     "subprocess orchestration + I/O integration" shape as runtime.rs -- the
#     uncovered lines are `WorkerRunner::run` (spawns threads, drives stdin,
#     joins the coordinator), `install_listener`'s rdev branches (require an
#     OS display / accessibility permission the default Sonar build never
#     has), the `spawn_event_pump` thread body, and `run_stdin_loop`'s
#     blocking read against a real stdin. The pure logic factored out
#     alongside them (`should_delegate_to_worker_rust`,
#     `swap_command_to_worker_rust`, `plan_worker_rust_delegation`,
#     `dispatch_stdin_command`, `forward_event`, `emit_worker_ready`) is
#     exercised by `worker_rust_tests.rs`; the end-to-end I/O path is
#     exercised by the Cargo integration test at
#     `src/rust/tests/worker_rust_subprocess.rs` (already excluded via the
#     top-level `src/rust/tests/**` rule) which spawns the binary and drives
#     synthetic press/release commands via stdin. Coverage on this file is
#     therefore excluded to match the runtime.rs pattern.
sonar.coverage.exclusions=src/rust/ui/tabs/**,src/rust/ui/theme.rs,src/rust/ui/widgets.rs,src/rust/ui/widgets_combo.rs,src/rust/ui/previews.rs,src/rust/ui/log_render.rs,src/rust/ui/text.rs,src/rust/ui/app.rs,src/rust/ui.rs,src/rust/ui/api_keys.rs,src/rust/ui/secret_store.rs,src/rust/ui/settings_state.rs,src/rust/ui/tasks.rs,src/rust/cloud_api.rs,src/rust/cloud_api/**,src/rust/postprocess/run.rs,src/rust/main.rs,src/python/whisper_dictate/vp_keys.py,src/python/whisper_dictate/vp_rust.py,src/python/whisper_dictate/runtime.py,src/python/whisper_dictate/vp_dictate.py,scripts/dev/**,scripts/benchmark/**,src/python/whisper_dictate/vp_keys_capture_io.py,src/rust/audio/stdin_bridge.rs,src/rust/runtime/audio_spawn.rs,src/rust/runtime.rs,src/rust/runtime/worker_rust.rs,src/rust/whisper/models_cli.rs,src/rust/hotkey/manager/rdev_driver.rs,src/rust/whisper/local/mod.rs,src/rust/whisper/dispatch.rs
