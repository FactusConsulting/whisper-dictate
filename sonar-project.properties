sonar.projectKey=FactusConsulting_whisper-dictate
sonar.organization=factusconsulting

# Keep sources and tests disjoint — a path in both lists makes the scanner fail
# with "can't be indexed twice" (the test dirs live under src/). The Rust crate
# is now flat under src/rust, so its integration tests (src/rust/tests) sit
# inside the source root and are carved back out via sonar.exclusions below.
sonar.sources=src/python/whisper_dictate,src/rust,scripts,packaging,nix
sonar.tests=src/tests,src/python/tests,src/rust/tests
sonar.python.version=3.12
sonar.rust.cargo.manifestPaths=src/rust/Cargo.toml
# Rust analysis runs as CI-based analysis (Rust is not eligible for SonarCloud
# Automatic Analysis). Import Clippy lints from the JSON report produced in
# sonar.yml instead of letting the analyzer re-run Clippy (avoids duplicates).
sonar.rust.clippy.enabled=false
sonar.rust.clippyReport.reportPaths=clippy-report.json

# Coverage reports are generated in sonar.yml and imported here. Both use
# repo-root-relative source paths so Sonar maps them onto sonar.sources:
#   - Python: coverage.py XML (<source> = repo root, filename = src/python/...).
#   - Rust: cargo-llvm-cov LCOV, path-normalized to repo root in sonar.yml.
sonar.python.coverage.reportPaths=coverage.xml
sonar.rust.lcov.reportPaths=lcov.info

sonar.exclusions=target/**,Output/**,__pycache__/**,.venv*/**,.codex-test-venv/**,*.egg-info/**,src/rust/tests/**

# Coverage exclusions: egui immediate-mode UI rendering carries no meaningful
# unit coverage (the testable logic lives in settings_state/config/platform,
# which stay measured), and developer/benchmark scripts are not shipped app
# logic. These files are still analysed for bugs/smells/security — they just
# don't drag the coverage metric.
sonar.coverage.exclusions=src/rust/ui/tabs/**,src/rust/ui/widgets.rs,src/rust/ui/previews.rs,src/rust/ui/log_render.rs,src/rust/ui/app.rs,scripts/dev/**,scripts/benchmark/**
