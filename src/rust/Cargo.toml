[package]
name = "whisper-dictate-app"
version = "1.20.8"
edition = "2021"
license = "MIT"
repository = "https://github.com/FactusConsulting/whisper-dictate"

[lib]
path = "lib.rs"

[[bin]]
name = "whisper-dictate"
path = "main.rs"

# Renderer selection. These features gate the eframe renderer backend; `default`
# selects glow (our shipping renderer). Enabling both is allowed â€” ui.rs prefers
# wgpu when `ui-egui-wgpu` is on â€” but a normal build is glow. Build wgpu with
# `--no-default-features --features ui-egui-wgpu`. ui.rs picks the matching
# `eframe::Renderer` by cfg. The renderer-matrix CI workflow builds BOTH so the
# wgpu exit route never silently rots.
[features]
default = ["ui-egui-glow", "history-sqlite"]
ui-egui-glow = ["eframe/glow"]
ui-egui-wgpu = ["eframe/wgpu"]
# Local SQLite-backed transcription history (issue #324). Pulls in
# `rusqlite` with its `bundled` feature so we ship our own SQLite (no
# system libsqlite3 dep â€” matches the project's "no system deps" stance).
# Enabled by default: the history store is part of the shipping desktop
# experience. Build with `--no-default-features` (or
# `--no-default-features --features ui-egui-glow`) to opt out, e.g. for
# minimal CI binaries that don't need the history table.
history-sqlite = ["dep:rusqlite"]
# Local Whisper inference via the whisper.cpp bindings (`whisper-rs`).
# OFF by default: enabling this feature pulls in whisper-rs and requires
# CMake and a C/C++ compiler (e.g. clang) on the build host, since
# whisper-rs compiles whisper.cpp from source. This is the CPU-only spike
# (see roadmap issue #317 sub-task 1); the module lives in `src/rust/whisper`
# and is wired nowhere in the runtime yet.
# Note: `hound` (WAV decode) is an unconditional dep so the WAV helpers in
# `whisper::wav` compile and are unit-tested on every CI run without CMake.
whisper-rs-local = ["dep:whisper-rs"]
# Vulkan GPU acceleration for `whisper-rs-local` (Wave 7-C of #348). Pulls
# in whisper.cpp's Vulkan backend at compile time â€” works on Windows AND
# Linux from a single feature (vendor-agnostic, no NVIDIA-only CUDA DLLs).
# Requires the Vulkan SDK on the build host on top of the `whisper-rs-local`
# prerequisites. OFF by default; runtime selection is via `VOICEPI_WHISPER_GPU`
# (see `src/rust/whisper/gpu.rs`). On a build without this feature the env
# var still parses but the resolver in `should_use_gpu` always returns
# false, so users that set `VOICEPI_WHISPER_GPU=vulkan` on a stock binary
# silently fall back to CPU rather than refusing to run.
whisper-rs-vulkan = ["whisper-rs-local", "whisper-rs/vulkan"]
# Experimental Rust-side audio pipeline (cpal capture â†’ rubato resample â†’
# Silero v4 VAD via vad-rs/ort). OFF by default so a stock build doesn't
# pull in the ONNX runtime or the native cpal backends. When the supervisor
# is launched with VOICEPI_AUDIO_BACKEND=rust AND this feature was compiled
# in, the Rust controller spawns the pipeline in a worker thread and pipes
# encoded frames into the Python worker via stdin (--audio-source=rust-stdin).
# See src/rust/audio/ for the implementation and the PR description for the
# rollout plan.
audio-in-rust = ["dep:cpal", "dep:rubato", "dep:vad-rs", "dep:base64", "dep:tempfile", "dep:ort-sys"]
# Experimental Rust-side PTT hotkey coordinator (issue #318). Owns the global
# key-event loop in Rust via `rdev` and serialises lifecycle events through a
# stage state machine so press/release races (#254, #274) become unrepresentable.
# OFF by default â€” pynput in src/python/whisper_dictate/vp_keys.py stays the
# shipping path for this PR. Activate at runtime with VOICEPI_HOTKEY_BACKEND=rust
# AND a binary built with `--features rust-hotkeys`; otherwise the supervisor's
# behaviour is byte-identical to today.
rust-hotkeys = ["dep:rdev", "dep:evdev"]
# Phase 2.1 Rust-side keyboard injection (issue #348 sub-task 2.1). Pulls in
# `enigo` as a cross-platform direct-injection baseline (SendInput on Windows,
# CGEventTap on macOS, xdotest on Linux/X11). Linux Wayland still uses the
# helper fallback chain (kwtype/wtype/dotool/ydotool) which is dep-free. OFF
# by default â€” the Python `vp_inject.py` path remains the shipping default.
# Activate at runtime with VOICEPI_INJECTION_BACKEND=rust AND a binary built
# with `--features rust-injection`; otherwise the worker's behaviour is
# byte-identical to today.
rust-injection = ["dep:enigo"]

[dependencies]
anyhow = "1.0"
# Unicode default case-folding (full C+F mappings â€” `Ăź â†’ ss`, `Ä° â†’ i\u{307}`,
# ligatures, etc.). Used by `benchmark::scoring` to keep WER/CER/term-match
# behaviour bit-identical to Python's `str.casefold()` (the corpus side of
# the port).
caseless = "0.2"
clap = { version = "4.5", features = ["derive"] }
# eframe 0.34 flipped its DEFAULT renderer from glow (OpenGL) to wgpu. We ship on
# glow and keep wgpu as a continuously-validated exit route, so the renderer is
# chosen by OUR features (see [features] below) rather than eframe's default:
# `default-features = false` drops eframe's renderer default, the common
# (non-renderer) features stay always-on here, and exactly one of
# `ui-egui-glow` / `ui-egui-wgpu` turns on `eframe/glow` / `eframe/wgpu`.
# Default build = glow; wgpu is opt-in via
# `--no-default-features --features ui-egui-wgpu` and is exercised by the
# periodic renderer-matrix CI workflow.
eframe = { version = "0.35", default-features = false, features = [
  "accesskit",
  "default_fonts",
  "wayland",
  "x11",
] }
egui_material_icons = "0.7.0"
regex = "1.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
# SHA-256 integrity check on downloaded whisper.cpp GGML models
# (`whisper::model_manager`). Already a transitive dep of `keyring-core` /
# `eframe` on most platforms, so the direct pin doesn't grow the dep graph.
sha2 = "0.11"
thiserror = "2.0"
keyring-core = "1.0"
ureq = { version = "3.3", features = ["json"] }
# hound: pure-Rust WAV reader/writer, used by `whisper::wav` for 16 kHz mono
# decoding. Unconditional so the WAV helpers are always available and covered.
hound = "3.5"
# Optional deps for the `whisper-rs-local` feature. `dep:` syntax in
# [features] keeps them out of the default build entirely.
whisper-rs = { version = "0.16", optional = true }

# --- audio-in-rust feature deps (all OPTIONAL; not pulled in for default builds)
# cpal: cross-platform microphone capture (WASAPI on Windows, ALSA on Linux).
# rubato: fixed-frame FFT resampler (input chunk size â†’ fixed output frame).
# vad-rs: Silero v5 wrapper around `ort` (ONNX Runtime); `default-features = false`
#   to skip the libsamplerate-based `helpers` feature â€” we already resample with
#   rubato and don't want a second native sample-rate dep on Windows.
# base64: compact encoding of f32 frames over the Rustâ†’Python stdin link.
# tempfile: vad-rs only accepts a file path; we materialise the embedded
#   silero_vad.onnx bytes to a temp file at startup.
cpal = { version = "0.18", optional = true }
# rubato 4.x collapsed the old `FftFixedIn` / `FftFixedInOut` types into a
# single `Fft` with a `FixedSync` selector, and moved buffer handling to the
# `audioadapter_buffers` crate (re-exported at `rubato::audioadapter_buffers`).
# `src/rust/audio/resampler.rs` uses `Fft::new_custom(..., FixedSync::Input)`
# with `SequentialSlice` / `SequentialSliceOfVecs` adapters to preserve the
# pre-v4 "fixed input chunk, variable output" contract.
rubato = { version = "4.0", optional = true }
vad-rs = { version = "0.1", optional = true, default-features = false }
base64 = { version = "0.22", optional = true }
tempfile = { version = "3.14", optional = true }
# `ort-sys` is a transitive dep of `vad-rs â†’ ort` (vad-rs pins ort to
# `=2.0.0-rc.9`). Without an explicit pin here, cargo resolves the
# unconstrained `ort-sys` dep up to rc.12, which broke API compatibility
# with `ort` rc.9 (200+ build errors). Pin it back to rc.9 so the ABI lines
# up; this is a workaround for a vad-rs version-range gap and should drop
# out when vad-rs publishes against a newer ort. The dep itself is unused
# by our code â€” we depend on it only for the version pin.
ort-sys = { version = "=2.0.0-rc.9", optional = true }

# --- rust-hotkeys feature dep (OPTIONAL; not pulled in for default builds)
# rdev: cross-platform global key event listener (X11 / Windows / macOS via the
# accessibility API). The native handles are not Send, so the manager thread
# owns the listen() call and exposes a Send-friendly mpsc API to the rest of
# the runtime â€” see src/rust/hotkey/manager.rs.
rdev = { version = "0.5", optional = true }

# --- rust-injection feature dep (OPTIONAL; not pulled in for default builds)
# enigo: cross-platform synthetic-input. We use it for Windows (SendInput) and
# macOS (CGEventTap); Linux X11 also works out of the box, but the Wayland
# helper chain (kwtype/wtype/dotool/ydotool) is dep-free and lives in
# src/rust/injection/fallback.rs. Send/Sync constraints are handled inside the
# dispatcher (each inject_text call constructs a fresh Enigo).
enigo = { version = "0.6", optional = true }

# --- history-sqlite feature dep (default-on)
# rusqlite with the `bundled` feature compiles SQLite from source so we
# don't depend on a system libsqlite3. The bundled build enables FTS5
# (used for searchable history text); a runtime probe in
# `history::schema` still detects missing FTS5 and falls back to LIKE.
# The 0.32 line is the last release on SQLite 3.45 which compiles cleanly
# in the devcontainer image without bumping the MSRV.
rusqlite = { version = "0.40", features = ["bundled"], optional = true }

[target.'cfg(target_os = "linux")'.dependencies]
zbus-secret-service-keyring-store = { version = "1.0", features = ["crypto-rust"] }
# Signal handling for issue #326 (CLI flags + Unix signals for external toggle).
# Linux-only: SIGUSR1 (toggle) and SIGUSR2 (cancel) let compositor keybindings
# drive recording via `kill -USR1 $(pidof whisper-dictate)` or `whisper-dictate
# --toggle-recording`. signal-hook is the standard idiomatic wrapper over
# signal-hook-registry (already a transitive dep, so no new crates pulled in).
# libc is the cross-platform standard already in the dep graph; we use it
# directly for `libc::kill` on the CLI forwarder side.
signal-hook = "0.4"
libc = "0.2"
# evdev: direct /dev/input keyboard listener for the `rust-hotkeys` feature on
# Linux. `rdev` only speaks X11 (XRecord), which cannot observe global key
# events on Wayland â€” so on GNOME/KDE Wayland the rdev listener is deaf and PTT
# never fires. `evdev` reads the kernel input devices directly (needs the user
# in the `input` group), which works identically on X11 and Wayland; the deleted
# Python backend used evdev for exactly this reason. Optional + Linux-only; the
# `rust-hotkeys` feature enables it via `dep:evdev` and the driver is selected at
# runtime by `manager::select` (evdev on Wayland, rdev on X11).
evdev = { version = "0.13", optional = true }

[target.'cfg(target_os = "macos")'.dependencies]
apple-native-keyring-store = { version = "1.0", features = ["keychain"] }

# Windows-only system-tray icon (notification area). Scoped to the Windows
# target so the Linux/CI build never pulls in tray-icon's gtk/libxdo system
# deps (its default features). On Windows it integrates with the winit/win32
# event loop that eframe already pumps. The pure stateâ†’colour and RGBA logic
# in `ui::tray` is cfg-free so its unit tests run on every platform.
[target.'cfg(windows)'.dependencies]
tray-icon = { version = "0.24", default-features = false }
windows-native-keyring-store = "1.1"

[build-dependencies]
winresource = "0.1"

[dev-dependencies]
tempfile = "3.14"

# Windows intermittently denies rustc access while finalizing incremental cache
# directories, which turns clean builds/tests into noisy warnings. Full rebuilds
# are a bit slower, but deterministic logs are more useful for this desktop app.
[profile.dev]
incremental = false

[profile.test]
incremental = false
