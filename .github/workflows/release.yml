name: release

# Cut a release by pushing a version tag:
#   git tag v0.1.1 && git push origin v0.1.1
# (or run this workflow manually from the Actions tab with an existing
# tag). It builds the platform bundles, generates release notes from the
# commit messages since the previous tag, publishes the GitHub Release, and
# builds/uploads the Windows installers.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.1'
        required: true

jobs:
  # Gate the entire release on the full test suite (same jobs as CI, reused via
  # workflow_call). A tag must not ship if unit/rust/smoke/lint checks fail.
  tests:
    uses: ./.github/workflows/test.yml
    # The called workflow's `changes` job (added in #398 for docs-only PR
    # skipping) requests `pull-requests: read` so dorny/paths-filter can hit
    # the PR-files API. Reusable workflows cannot exceed the permissions the
    # caller grants -- when this `tests:` call had no `permissions:` block,
    # the entire release workflow startup-failed on tag push (zero jobs
    # spawned, conclusion: startup_failure) because the called job requested
    # more than was offered. Forwarding the same two read scopes here makes
    # the call valid; on a tag push there is no PR so paths-filter falls
    # back to no-op (empty match set) and downstream jobs use the workflow
    # `!cancelled()` gates to run regardless.
    permissions:
      contents: read
      pull-requests: read
    with:
      # Gate on the tag being shipped. On tag push this equals the workflow ref;
      # on manual workflow_dispatch it is the explicit tag input, not the dispatch branch.
      ref: ${{ github.event.inputs.tag || github.ref_name }}

  release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      # Computed once from the tag and consumed by the windows-installer job so a
      # prerelease (RC) tag never bumps finals-only channels (Homebrew, winget).
      is_prerelease: ${{ steps.resolve.outputs.is_prerelease }}
    steps:
      - name: Resolve tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          # Prerelease (RC) detection: a SemVer release-candidate tag carries a
          # literal `-rc.` segment (e.g. v1.9.5-rc.1). A plain vX.Y.Z is NOT a
          # prerelease. Matching `-rc.` (with the trailing dot) is precise: it
          # won't false-match a hypothetical `-rcfoo` and requires an index to
          # follow. This single output gates every prerelease-aware step below.
          case "$TAG" in
            *-rc.*) IS_PRERELEASE=true ;;
            *)      IS_PRERELEASE=false ;;
          esac
          echo "is_prerelease=$IS_PRERELEASE" >> "$GITHUB_OUTPUT"
          echo "Resolved $TAG -> is_prerelease=$IS_PRERELEASE"

      - uses: actions/checkout@v6   # v5 = Node 24 (v4/Node 20 is being removed)
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0          # full history + tags for generated release notes

      - name: Sanity-check scripts
        run: |
          bash -n scripts/linux/install-rust-ui.sh
          bash -n packaging/linux/ubuntu26.04/setup.sh

      - name: Install Linux Rust UI build deps
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxtst-dev \
            libasound2-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      # Cache the dependency build so the optimized release build reuses the
      # crate graph instead of recompiling every dependency from scratch.
      # shared-key (stable, not job-name-scoped) lets a tag run restore whatever
      # this key last wrote. NOTE: warm-release-cache.yml is WINDOWS-ONLY, so the
      # Linux release cache is NOT warmed on main — it is only populated by prior
      # tagged Linux release runs (cache-on-failure keeps it even when a later
      # step fails). The Windows step below is the one the warm job populates.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> ../target"
          shared-key: "rust-release-linux"
          cache-on-failure: true

      - name: Build Rust desktop UI
        run: cargo build --manifest-path src/rust/Cargo.toml --target-dir target --release -p whisper-dictate-app --features rust-injection,rust-hotkeys,audio-in-rust,whisper-rs-local

      - name: Build bundles
        run: |
          set -e
          mkbundle() {   # $1 zip
            zip_name="$1"
            shift || true
            d=whisper-dictate; rm -rf "$d"; mkdir "$d"
            cp -r docs README.md LICENSE "$d/"
            # Wave 8 (#348): the Python worker package was deleted; the
            # compiled Rust binary is the only runtime shipped in this bundle.
            # Ship the golden-benchmark manifest (corpus.json only — NOT the
            # user-local, gitignored audio) so "Run benchmark" resolves a corpus
            # out of the box. Mirrors the Inno installer's benchmark/corpus.json.
            mkdir -p "$d/benchmark"
            cp benchmark/corpus.json "$d/benchmark/"
            mkdir -p "$d/assets"
            cp assets/whisper-dictate-logo.svg "$d/assets/"
            mkdir -p "$d/scripts"
            cp scripts/dev/inject-smoke.py "$d/scripts/"
            cp scripts/linux/install-rust-ui.sh "$d/scripts/"
            mkdir -p "$d/packaging/linux/ubuntu26.04"
            cp packaging/linux/ubuntu26.04/setup.sh "$d/packaging/linux/ubuntu26.04/"
            printf "%s\n" "$VERSION" > "$d/VERSION"
            if [ "${INCLUDE_RUST_UI:-0}" = "1" ]; then
              install -m 0755 target/release/whisper-dictate "$d/whisper-dictate"
              # Ship ONNX Runtime next to the binary (Wave 8 / rc.2): the
              # `audio-in-rust` feature pulls in vad-rs -> ort, which
              # dynamically loads libonnxruntime.so* at startup. ort's
              # `copy-dylibs` build feature drops it in target/release/
              # next to the executable; we just have to ship it next to
              # the installed binary too. Skip-if-missing keeps the
              # bundle build green during local dev builds without the
              # audio-in-rust feature.
              find target/release -maxdepth 1 -name "libonnxruntime.so*" -exec install -m 0644 {} "$d/" \; 2>/dev/null || true
            fi
            [ -f "$d/scripts/install-rust-ui.sh" ] && chmod +x "$d/scripts/install-rust-ui.sh"
            zip -q -r "$zip_name" "$d"; rm -rf "$d"
          }
          install -m 0755 target/release/whisper-dictate "whisper-dictate-linux-rust-ui-${VERSION}"
          INCLUDE_RUST_UI=1 mkbundle "whisper-dictate-linux-${VERSION}.zip"

      - name: Generate release notes from commit messages
        run: |
          set -e
          PREV=$(git tag --sort=-v:refname | grep -vFx "$TAG" | head -n1 || true)
          {
            if [ -n "$PREV" ]; then
              echo "## Changes ($PREV → $TAG)"
              echo
              git log --no-merges --pretty='- %s (%h)' "$PREV..$TAG"
            else
              echo "## Changes"
              echo
              git log --no-merges --pretty='- %s (%h)' "$TAG"
            fi
          } > NOTES.md
          echo "----- generated notes -----"; cat NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          # An RC tag (vX.Y.Z-rc.N) publishes a GitHub *prerelease*: it is hidden
          # from "Latest release" so stable users don't pick it up. A plain
          # vX.Y.Z stays a normal (latest) release — the flag is empty then, so
          # this path is byte-for-byte unchanged for finals.
          IS_PRERELEASE: ${{ steps.resolve.outputs.is_prerelease }}
        run: |
          set -e
          assets=(
            "whisper-dictate-linux-${VERSION}.zip"
            "whisper-dictate-linux-rust-ui-${VERSION}"
          )
          prerelease_flag=()
          if [ "$IS_PRERELEASE" = "true" ]; then
            prerelease_flag=(--prerelease)
          fi
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" "${prerelease_flag[@]}" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
            gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" "${prerelease_flag[@]}" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
          fi

      # NOTE: nix/package.nix is bumped in the pre-release version PR (alongside
      # VERSION), not auto-committed here — main is protected (PR + CI only), so
      # CI must not push to it. See the version-bump PR for each release.

      - name: Bump Homebrew tap
        # Skip on prerelease: Homebrew has no prerelease channel (the tap formula
        # is a single "latest" version), so RCs are finals-only here. The guard
        # is `if:` rather than an in-script early-exit so the step is visibly
        # skipped for RCs; for finals it runs exactly as before.
        if: steps.resolve.outputs.is_prerelease != 'true'
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set - skipping Homebrew tap bump."
            exit 0
          fi
          asset="whisper-dictate-linux-${VERSION}.zip"
          src="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${asset}"
          sha=$(curl -fsSL "$src" | sha256sum | cut -d' ' -f1)
          echo "linux release bundle sha256: $sha"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/FactusConsulting/homebrew-tap.git" tap
          f=tap/Formula/whisper-dictate.rb
          cat > "$f" <<EOF
          class WhisperDictate < Formula
            desc "Local push-to-talk dictation -- speak prompts instead of typing them"
            homepage "https://github.com/FactusConsulting/whisper-dictate"
            url "${src}"
            sha256 "${sha}"
            license "MIT"

            depends_on "portaudio"

            def install
              payload = Dir["whisper-dictate/*"]
              payload = Dir["*"] if payload.empty?
              libexec.install payload
              chmod 0755, libexec/"whisper-dictate"
              chmod 0755, libexec/"packaging/linux/ubuntu26.04/setup.sh"

            (bin/"whisper-dictate").write <<~SH
              #!/bin/bash
              install_linux_app_icon() {
                local home="\$1"
                local icon_src="#{libexec}/assets/whisper-dictate-logo.svg"
                local icon_path="\$home/.local/share/icons/hicolor/scalable/apps/whisper-dictate.svg"
                [ -n "\$home" ] || return 0
                [ -f "\$icon_src" ] || return 0
                mkdir -p "\$home/.local/share/icons/hicolor/scalable/apps" || return 0
                cp "\$icon_src" "\$icon_path" 2>/dev/null || true
                gtk-update-icon-cache -q "\$home/.local/share/icons/hicolor" 2>/dev/null || true
              }

              repair_linux_desktop_entry() {
                local path="\$1"
                local autostart="\$2"
                local exec_path="#{opt_bin}/whisper-dictate"
                local icon_path="\${HOME:-}/.local/share/icons/hicolor/scalable/apps/whisper-dictate.svg"
                [ -n "\${HOME:-}" ] || return 0
                install_linux_app_icon "\${HOME:-}"
                [ -f "\$path" ] || return 0
                grep -Fq "whisper-dictate" "\$path" || return 0
                if grep -Fq "Exec=\${exec_path} ui" "\$path" &&
                   grep -Fq "Icon=\${icon_path}" "\$path" &&
                   grep -Fq "StartupWMClass=whisper-dictate" "\$path"; then
                  return 0
                fi

                mkdir -p "\$(dirname "\$path")" || return 0
                {
                  printf '%s\\n' '[Desktop Entry]'
                  printf '%s\\n' 'Name=Whisper Dictate'
                  printf '%s\\n' 'Comment=Push-to-talk dictation settings and runtime control'
                  printf 'Exec=%s ui\\n' "\$exec_path"
                  printf 'Icon=%s\\n' "\$icon_path"
                  printf '%s\\n' 'Terminal=false'
                  printf '%s\\n' 'Type=Application'
                  printf '%s\\n' 'Categories=Utility;AudioVideo;Audio;'
                  printf '%s\\n' 'StartupNotify=true'
                  printf '%s\\n' 'StartupWMClass=whisper-dictate'
                  if [ "\$autostart" = "1" ]; then
                    if grep -Fq 'X-GNOME-Autostart-enabled=false' "\$path"; then
                      printf '%s\\n' 'X-GNOME-Autostart-enabled=false'
                    else
                      printf '%s\\n' 'X-GNOME-Autostart-enabled=true'
                    fi
                  fi
                } > "\$path" 2>/dev/null || true
              }

              if [ "\$(uname -s 2>/dev/null)" = "Linux" ]; then
                repair_linux_desktop_entry "\${HOME:-}/.local/share/applications/whisper-dictate.desktop" 0
                repair_linux_desktop_entry "\${HOME:-}/.config/autostart/whisper-dictate.desktop" 1
              fi

              export VOICEPI_APP_ROOT="#{libexec}"
              export VOICEPI_SKIP_SYSCHECK=1
              exec "#{libexec}/whisper-dictate" "\$@"
            SH
          end

            def post_install
              return unless OS.linux?

              linux_desktop_homes.each do |home|
                install_linux_app_icon(home)
                repair_linux_desktop_entry(
                  Pathname.new(home)/".local/share/applications/whisper-dictate.desktop",
                  opt_bin/"whisper-dictate",
                  false,
                  home,
                )
                repair_linux_desktop_entry(
                  Pathname.new(home)/".config/autostart/whisper-dictate.desktop",
                  opt_bin/"whisper-dictate",
                  true,
                  home,
                )
              end
            end

            def linux_desktop_homes
              homes = [ENV["HOME"], *Dir["/home/*"]]
              homes.compact.uniq.select { |home| File.directory?(home) }
            end

            def repair_linux_desktop_entry(path, exe, autostart, home)
              return unless path.exist?

              raw = path.read
              return unless raw.include?("whisper-dictate")
              icon_path = linux_app_icon_path(home)
              return if raw.include?("Exec=#{exe} ui") &&
                raw.include?("Icon=#{icon_path}") &&
                raw.include?("StartupWMClass=whisper-dictate")

              path.dirname.mkpath
              File.write(path.to_s, <<~DESKTOP)
                [Desktop Entry]
                Name=Whisper Dictate
                Comment=Push-to-talk dictation settings and runtime control
                Exec=#{exe} ui
                Icon=#{icon_path}
                Terminal=false
                Type=Application
                Categories=Utility;AudioVideo;Audio;
                StartupNotify=true
                StartupWMClass=whisper-dictate
                #{autostart ? autostart_enabled_line(raw) : ""}
              DESKTOP
            rescue Errno::EACCES, Errno::EPERM
              nil
            end

            def install_linux_app_icon(home)
              icon_src = libexec/"assets/whisper-dictate-logo.svg"
              return unless icon_src.exist?

              icon_path = linux_app_icon_path(home)
              icon_path.dirname.mkpath
              cp icon_src, icon_path
              quiet_system "gtk-update-icon-cache", "-q", (Pathname.new(home)/".local/share/icons/hicolor").to_s
            rescue Errno::EACCES, Errno::EPERM
              nil
            end

            def linux_app_icon_path(home)
              Pathname.new(home)/".local/share/icons/hicolor/scalable/apps/whisper-dictate.svg"
            end

            def autostart_enabled_line(raw)
              if raw.include?("X-GNOME-Autostart-enabled=false")
                "X-GNOME-Autostart-enabled=false"
              else
                "X-GNOME-Autostart-enabled=true"
              end
            end

            def caveats
              <<~EOS
                Wave 8 of #348 removed the Python worker; the shipped binary is
                Rust-only and downloads the selected STT model on demand.

                Ubuntu 24.04/26.04 Wayland - one-time desktop setup:

                  whisper-dictate setup-ubuntu

                Then start the desktop app:

                  whisper-dictate ui

                Terminal dictation is also available:

                  whisper-dictate run --key ctrl_r --lang da
              EOS
            end

            test do
              assert_path_exists libexec/"whisper-dictate"
              assert_path_exists libexec/"packaging/linux/ubuntu26.04/setup.sh"
              assert_match version.to_s, shell_output("#{bin}/whisper-dictate --version")
            end
          end
          EOF
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whisper-dictate.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "whisper-dictate ${VERSION}"
          git push origin HEAD:main

  # Build + publish the Windows installer (Inno .exe, portable ZIP, Chocolatey
  # .nupkg, winget manifests). The build steps live in ONE place — the reusable
  # .github/workflows/windows-installer-build.yml — shared with the manual
  # windows-installer.yml rebuild, so the two can never drift (a past prerelease
  # Inno fix was applied to only one copy and two RCs failed). This job just
  # forwards the resolved tag + prerelease flag and the optional private-feed
  # secrets; GITHUB_TOKEN is inherited automatically by the reusable workflow.
  windows-installer:
    needs: release
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/windows-installer-build.yml
    with:
      tag: ${{ github.event.inputs.tag || github.ref_name }}
      is_prerelease: ${{ needs.release.outputs.is_prerelease }}
    secrets:
      CHOCOLATEY_NUGET_SOURCE: ${{ secrets.CHOCOLATEY_NUGET_SOURCE }}
      CHOCOLATEY_NUGET_API_KEY: ${{ secrets.CHOCOLATEY_NUGET_API_KEY }}

  # Gate A — automated install-smoke (docs/RELEASING.md "Test the RC" step 1).
  #
  # POST-PUBLISH gate: it runs AFTER the release + installer are published and
  # only FLAGS a broken release (a red "install-smoke" check) — it never deletes
  # or unpublishes anything. Runs for BOTH finals and prereleases (it's cheap)
  # so the rc.1/rc.2-class breakage (Inno build that failed, or an installed app
  # that won't even launch / whose worker package won't import) is caught
  # automatically instead of waiting for the manual install-smoke.
  #
  # What it proves on a HEADLESS windows-2025 runner:
  #   * the just-published setup .exe silently installs (Inno /VERYSILENT),
  #   * the installed layout is complete (exe + corpus + VERSION matching the tag),
  #   * the Rust controller launches headless and exits 0 (no egui window),
  #   * the installed Python worker package imports and runs its NO-MODEL audio
  #     utility query modes cleanly (exit 0, parseable JSON — not a traceback).
  #
  # What it deliberately does NOT cover (stays manual — see docs/RELEASING.md):
  #   * real microphone capture / inject / post end-to-end (no audio device on a
  #     cloud VM), and
  #   * a real STT model load (heavy CUDA/torch/faster-whisper deps are NOT
  #     installed here — the worker smoke installs only sounddevice + numpy).
  install-smoke:
    needs: [release, windows-installer]
    runs-on: windows-2025
    permissions:
      contents: read
    steps:
      - name: Resolve tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"
          echo "Resolved $TAG -> VERSION=${TAG#v}"

      - name: Download the published Windows setup .exe
        id: download
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          # The reusable installer build SKIPS itself (and uploads no setup .exe)
          # when no Windows-relevant files changed since the previous tag. That is
          # a legitimate no-op, not a failure.
          #
          # IMPORTANT: first check whether the asset EXISTS on the release — a
          # missing asset is the only legitimate reason to skip. A transient API
          # or network error during `gh release download` must NOT silently skip
          # the gate (that would let a broken release sail through as green).
          # Strategy:
          #   - Query the release asset list; count matching setup .exe assets.
          #   - 0 matches → legitimately no installer built, skip (found=false).
          #   - ≥1 match  → asset exists, so the download MUST succeed; any
          #                  failure propagates as a hard error (set -e exits).
          asset_count=$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" \
            --json assets \
            --jq '[.assets[].name | select(test("whisper-dictate-windows-setup"))] | length')
          if [ "$asset_count" -eq 0 ]; then
            echo "No setup .exe asset on release $TAG (installer build was skipped — no Windows-relevant changes). Skipping install-smoke."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Asset exists — download it; any failure is a real error (set -e).
          mkdir -p dl
          gh release download "$TAG" --repo "$GITHUB_REPOSITORY" \
                --pattern 'whisper-dictate-windows-setup-*.exe' --dir dl
          # Glob into an array (nullglob => empty, not the literal pattern) and
          # take the first match — avoids parsing `ls` output (shellcheck SC2012).
          shopt -s nullglob
          matches=(dl/whisper-dictate-windows-setup-*.exe)
          shopt -u nullglob
          setup="${matches[0]:-}"
          if [ -z "$setup" ]; then
            echo "No setup .exe matched after download. Skipping install-smoke."
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Setup installer: $setup"
          echo "found=true" >> "$GITHUB_OUTPUT"
          # Forward an absolute Windows path so the pwsh steps below can run it.
          echo "SETUP_EXE=$(cygpath -w "$(pwd)/$setup")" >> "$GITHUB_ENV"

      - name: Silent install + assert installed layout
        if: steps.download.outputs.found == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $setup = $env:SETUP_EXE
          if (-not (Test-Path -LiteralPath $setup)) { throw "Setup exe not found at $setup" }

          # Inno silent install. Start-Process -Wait is the robust idiom: the
          # installer's own process exits when the (clean-machine, no prior
          # version => no uninstaller relaunch) install finishes, so -Wait blocks
          # until the files are on disk. /VERYSILENT /SUPPRESSMSGBOXES /NORESTART
          # is exactly the silent contract the .iss is written against.
          Write-Host "Installing $setup ..."
          $p = Start-Process -FilePath $setup `
                 -ArgumentList '/VERYSILENT','/SUPPRESSMSGBOXES','/NORESTART' `
                 -Wait -PassThru
          if ($p.ExitCode -ne 0) { throw "Silent install failed with exit code $($p.ExitCode)" }

          # DefaultDirName={localappdata}\Programs\WhisperDictate (see the .iss).
          $appRoot = Join-Path $env:LOCALAPPDATA 'Programs\WhisperDictate'
          Write-Host "Install root: $appRoot"
          if (-not (Test-Path -LiteralPath $appRoot)) { throw "Install root missing: $appRoot" }

          # Assert the full expected install layout. Each of these is a real
          # regression guard: the Rust exe (launch) and the benchmark corpus (#234).
          # Wave 8 (#348) removed the Python worker package.
          $required = @(
            'whisper-dictate.exe',
            'benchmark\corpus.json',
          )
          foreach ($rel in $required) {
            $full = Join-Path $appRoot $rel
            if (-not (Test-Path -LiteralPath $full)) { throw "Missing installed file: $rel" }
            Write-Host "  ok  $rel"
          }

          # VERSION content must equal the tag's version (with the leading v
          # stripped). Catches a setup .exe built from the wrong ref/version.
          $versionFile = Join-Path $appRoot 'VERSION'
          if (-not (Test-Path -LiteralPath $versionFile)) { throw "Missing installed VERSION file" }
          $installed = (Get-Content -LiteralPath $versionFile -Raw).Trim()
          $expected  = $env:VERSION
          if ($installed -ne $expected) {
            throw "Installed VERSION '$installed' != expected '$expected'"
          }
          Write-Host "  ok  VERSION = $installed"
          "APP_ROOT=$appRoot" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Rust controller headless smoke (no UI window)
        if: steps.download.outputs.found == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $env:APP_ROOT 'whisper-dictate.exe'
          # The release binary is a Windows GUI-subsystem app
          # (windows_subsystem = "windows"), so when launched from a redirected
          # shell its println! stdout is NOT attached to this console — we can
          # only rely on the PROCESS EXIT CODE, not captured text. The
          # load-bearing assertion is therefore: a headless-safe entrypoint
          # (--version: parse args, print version, return Ok) launches and exits
          # 0 WITHOUT opening the egui window. (A UI subcommand would block.)
          Write-Host "Running: whisper-dictate.exe --version"
          $p = Start-Process -FilePath $exe -ArgumentList '--version' -Wait -PassThru -WindowStyle Hidden
          if ($p.ExitCode -ne 0) { throw "whisper-dictate.exe --version exited $($p.ExitCode)" }
          Write-Host "  ok  --version exit 0"

          # config path is the other headless-safe entrypoint (prints a path,
          # opens no window); assert it too exits 0.
          Write-Host "Running: whisper-dictate.exe config path"
          $p2 = Start-Process -FilePath $exe -ArgumentList 'config','path' -Wait -PassThru -WindowStyle Hidden
          if ($p2.ExitCode -ne 0) { throw "whisper-dictate.exe config path exited $($p2.ExitCode)" }
          Write-Host "  ok  config path exit 0"

      - name: Rust worker headless smoke (worker-rust --stdin-only)
        if: steps.download.outputs.found == 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $exe = Join-Path $env:APP_ROOT 'whisper-dictate.exe'

          # Wave 5 PR 7 of #348: the installed release build ships with the full
          # feature set (whisper-rs-local,rust-injection,audio-in-rust,rust-hotkeys)
          # so `worker-rust` is the production dictation entry point that
          # RuntimeSupervisor::start delegates to. `--stdin-only` skips the rdev
          # OS-listener install (headless runner has no display / accessibility
          # permission) and drives the coordinator from stdin commands only —
          # closing stdin is the documented clean-shutdown mechanism on Windows
          # where SIGTERM isn't reliable. With no PTT chord configured
          # (VOICEPI_KEY unset) + closed stdin the worker emits its startup
          # `state=ready` heartbeat, waits, sees EOF, and exits 0.
          #
          # This is the load-bearing PR 7 assertion: the shipped Rust worker
          # binary comes up end-to-end on a fresh installer image without ever
          # invoking Python — the pre-PR-7 smoke test proved Python worked,
          # this one proves the new production default works.
          Write-Host "Running: whisper-dictate.exe worker-rust --stdin-only (stdin closed)"
          $stdinFile = Join-Path $env:TEMP 'wd-worker-rust-empty-stdin.txt'
          Set-Content -LiteralPath $stdinFile -Value '' -NoNewline
          $stderrFile = Join-Path $env:TEMP 'wd-worker-rust-stderr.log'
          $p = Start-Process `
            -FilePath $exe `
            -ArgumentList 'worker-rust','--stdin-only' `
            -Wait -PassThru -WindowStyle Hidden `
            -RedirectStandardInput $stdinFile `
            -RedirectStandardError $stderrFile
          Remove-Item -LiteralPath $stdinFile -ErrorAction SilentlyContinue
          if (Test-Path -LiteralPath $stderrFile) {
            Write-Host "--- worker-rust stderr ---"
            Get-Content -LiteralPath $stderrFile
            Write-Host "---------------------------"
          }
          if ($p.ExitCode -ne 0) {
            throw "whisper-dictate.exe worker-rust --stdin-only exited $($p.ExitCode) (expected 0 -- see stderr above)"
          }
          # Assert the startup heartbeat appeared on stderr: without this a
          # future refactor that made the worker exit 0 before ever emitting a
          # worker event would silently pass. The `[worker-event] ` prefix +
          # `"state":"ready"` is the exact wire form
          # RuntimeSupervisor::parse_worker_event consumes.
          if (Test-Path -LiteralPath $stderrFile) {
            $stderrText = Get-Content -LiteralPath $stderrFile -Raw
            Remove-Item -LiteralPath $stderrFile -ErrorAction SilentlyContinue
            if ($stderrText -notmatch '\[worker-event\][^\n]*"state":"ready"') {
              throw "worker-rust did not emit startup [worker-event] state=ready heartbeat on stderr; got: $stderrText"
            }
            Write-Host "  ok  worker-rust emitted startup state=ready heartbeat"
          }
          Write-Host "  ok  worker-rust --stdin-only exit 0"

      - name: Summary
        if: steps.download.outputs.found == 'true'
        shell: bash
        run: |
          echo "install-smoke PASSED for $TAG: silent-install layout OK, Rust controller launches headless (exit 0), production worker-rust dictation entry point comes up end-to-end (emits state=ready, exits 0 on stdin EOF) — no Python required on the primary dictation path (Wave 5 PR 7 of #348)."
