name: release

# Cut a release by pushing a version tag:
#   git tag v0.1.1 && git push origin v0.1.1
# (or run this workflow manually from the Actions tab with an existing
# tag). It builds the four platform bundles, generates release notes
# from the commit messages since the previous tag, appends the
# evergreen RELEASE_NOTES.md body, publishes the GitHub Release, and
# builds/uploads the Windows .exe installers.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.1'
        required: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v5   # v5 = Node 24 (v4/Node 20 is being removed)
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0          # full history + tags for the changelog

      - name: Sanity-check scripts
        run: |
          python3 -c "import ast; ast.parse(open('voice_pi.py').read())"
          bash -n scripts/install-linux-rust-ui.sh
          bash -n ubuntu26.04/setup.sh

      - name: Install Linux Rust UI build deps
        run: |
          sudo apt update
          sudo apt install -y \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      - name: Build Rust desktop UI
        run: cargo build --release -p whisper-dictate-app

      - name: Build bundles
        run: |
          set -e
          mkbundle() {   # $1 zip
            zip_name="$1"
            shift || true
            d=whisper-dictate; rm -rf "$d"; mkdir "$d"
            cp voice_pi.py vp_*.py README.md LICENSE "$d/"
            [ -f dictionary.example.json ] && cp dictionary.example.json "$d/"
            [ -f requirements-parakeet.txt ] && cp requirements-parakeet.txt "$d/"
            [ -f requirements-cpu.txt ] && cp requirements-cpu.txt "$d/"
            [ -f requirements-gpu.txt ] && cp requirements-gpu.txt "$d/"
            mkdir -p "$d/scripts"
            cp scripts/inject-smoke.py scripts/install-linux-rust-ui.sh "$d/scripts/"
            mkdir -p "$d/ubuntu26.04"
            cp ubuntu26.04/setup.sh "$d/ubuntu26.04/"
            printf "%s\n" "$VERSION" > "$d/VERSION"
            if [ "${INCLUDE_RUST_UI:-0}" = "1" ]; then
              install -m 0755 target/release/whisper-dictate "$d/whisper-dictate"
            fi
            [ -f "$d/scripts/install-linux-rust-ui.sh" ] && chmod +x "$d/scripts/install-linux-rust-ui.sh"
            zip -q -r "$zip_name" "$d"; rm -rf "$d"
          }
          install -m 0755 target/release/whisper-dictate "whisper-dictate-linux-rust-ui-${VERSION}"
          INCLUDE_RUST_UI=1 mkbundle "whisper-dictate-linux-${VERSION}.zip"

      - name: Generate release notes from commit messages
        run: |
          set -e
          PREV=$(git tag --sort=-v:refname | grep -vFx "$TAG" | head -n1 || true)
          {
            if [ -n "$PREV" ]; then
              echo "## Changes ($PREV → $TAG)"
              echo
              git log --no-merges --pretty='- %s (%h)' "$PREV..$TAG"
            else
              echo "## Changes"
              echo
              git log --no-merges --pretty='- %s (%h)' "$TAG"
            fi
            echo
            echo "---"
            echo
            cat RELEASE_NOTES.md
          } > NOTES.md
          echo "----- generated notes -----"; cat NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          assets=(
            "whisper-dictate-linux-${VERSION}.zip"
            "whisper-dictate-linux-rust-ui-${VERSION}"
          )
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
            gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
          fi

      - name: Bump nix/package.nix version
        run: |
          set -e
          sed -i "s/version ? \"[^\"]*\"/version ? \"${VERSION}\"/" nix/package.nix
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nix/package.nix
          if git diff --cached --quiet; then
            echo "nix/package.nix already up to date."
            exit 0
          fi
          git commit -m "chore: bump nix/package.nix to ${VERSION}"
          # Rebase oven på main i tilfælde af parallelle pushes
          git fetch origin main
          git rebase origin/main
          git push origin HEAD:main

      - name: Bump Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set - skipping Homebrew tap bump."
            exit 0
          fi
          asset="whisper-dictate-linux-${VERSION}.zip"
          src="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${asset}"
          sha=$(curl -fsSL "$src" | sha256sum | cut -d' ' -f1)
          echo "linux release bundle sha256: $sha"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/FactusConsulting/homebrew-tap.git" tap
          f=tap/Formula/whisper-dictate.rb
          cat > "$f" <<EOF
          class WhisperDictate < Formula
            desc "Local push-to-talk dictation -- speak prompts instead of typing them"
            homepage "https://github.com/FactusConsulting/whisper-dictate"
            url "${src}"
            sha256 "${sha}"
            license "MIT"

            depends_on "portaudio"
            depends_on "python@3.12"

            def install
              payload = Dir["whisper-dictate/*"]
              payload = Dir["*"] if payload.empty?
              libexec.install payload
              chmod 0755, libexec/"whisper-dictate"
              chmod 0755, libexec/"ubuntu26.04/setup.sh"

              py = Formula["python@3.12"].opt_bin/"python3.12"
              (bin/"whisper-dictate").write <<~SH
                #!/bin/bash
                export VOICEPI_PYTHON="#{py}"
                export VOICEPI_APP_ROOT="#{libexec}"
                export VOICEPI_SKIP_SYSCHECK=1
                exec "#{libexec}/whisper-dictate" "\$@"
              SH
            end

            def caveats
              <<~EOS
                whisper-dictate builds a machine-local Python venv on first run
                (~/.venv-whisper-dictate) and downloads the selected STT model.

                Ubuntu 24.04/26.04 Wayland - one-time desktop setup:

                  whisper-dictate setup-ubuntu

                Then start the desktop app:

                  whisper-dictate ui

                Terminal dictation is also available:

                  whisper-dictate run --key ctrl_r --lang da
              EOS
            end

            test do
              assert_path_exists libexec/"voice_pi.py"
              assert_path_exists libexec/"whisper-dictate"
              assert_path_exists libexec/"ubuntu26.04/setup.sh"
              assert_match version.to_s, shell_output("#{bin}/whisper-dictate --version")
            end
          end
          EOF
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whisper-dictate.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "whisper-dictate ${VERSION}"
          git push origin HEAD:main

  windows-installer:
    needs: release
    runs-on: windows-2025
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Check for Windows-relevant changes
        id: win-check
        shell: bash
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$prev" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$prev" HEAD -- \
            Cargo.toml Cargo.lock crates/ \
            voice_pi.py 'vp_*.py' \
            requirements-cpu.txt requirements-gpu.txt \
            scripts/ \
            installer/)
          if [ -n "$changed" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "Windows files changed since $prev:"
            echo "$changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Windows-specific changes since $prev - skipping installer build"
          fi

      - name: Install Inno Setup
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.win-check.outputs.changed == 'true'

      - name: Build Rust desktop UI
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: cargo build --release -p whisper-dictate-app

      - name: Build installers
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          Set-Content VERSION $version -Encoding ascii
          $iscc    = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $outDir  = "$PWD\Output"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          & $iscc /DVERSION=$version /O"$outDir" installer\whisper-dictate.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Build Windows ZIP packages
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $outDir = "$PWD\Output"
          $bundle = Join-Path $outDir "zip-windows\whisper-dictate"
          Remove-Item (Split-Path $bundle -Parent) -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $bundle | Out-Null
          Copy-Item voice_pi.py $bundle
          Copy-Item vp_*.py $bundle
          Copy-Item README.md,TECHNICAL.md,LICENSE,VERSION $bundle
          Copy-Item dictionary.example.json $bundle -ErrorAction SilentlyContinue
          Copy-Item requirements-parakeet.txt $bundle -ErrorAction SilentlyContinue
          Copy-Item requirements-cpu.txt,requirements-gpu.txt $bundle
          New-Item -ItemType Directory -Force (Join-Path $bundle "assets") | Out-Null
          Copy-Item assets\whisper-dictate.ico (Join-Path $bundle "assets")
          Copy-Item target\release\whisper-dictate.exe $bundle
          New-Item -ItemType Directory -Force (Join-Path $bundle "scripts") | Out-Null
          Copy-Item scripts\inject-smoke.py (Join-Path $bundle "scripts")
          $zip = Join-Path $outDir "whisper-dictate-windows-$version.zip"
          Remove-Item $zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path (Split-Path $bundle -Parent) "whisper-dictate") -DestinationPath $zip -CompressionLevel Optimal

      - name: Compute SHA256 hashes
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $out = @()
          foreach ($f in Get-ChildItem "Output\*.exe", "Output\*.zip") {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$($f.Name)=$hash" | Tee-Object -Append sha256sums.txt
            $out += [pscustomobject]@{ File = $f.Name; SHA256 = $hash }
          }
          $out | ConvertTo-Json | Set-Content sha256sums.json -Encoding utf8
          Get-Content sha256sums.txt

      - name: Upload installers + checksums to release
        if: steps.win-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "$TAG" Output/*.exe Output/*.zip sha256sums.txt --repo "$GITHUB_REPOSITORY" --clobber

      - name: Generate winget manifests
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $repo    = "${{ github.repository }}"
          $tag     = "${{ env.TAG }}"
          $hashes  = Get-Content sha256sums.json | ConvertFrom-Json

          $installerHash = ($hashes | Where-Object File -eq "whisper-dictate-windows-setup-$version.exe").SHA256

          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          $date    = Get-Date -Format 'yyyy-MM-dd'
          $productCode = '{7B3F8A2C-4E1D-4F9A-B5C6-D2E8F0A1C3B7}_is1'

          New-Item -ItemType Directory -Force manifests | Out-Null

          @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json',
            "PackageIdentifier: FactusConsulting.WhisperDictate",
            "PackageVersion: $version",
            "DefaultLocale: en-US",
            "ManifestType: version",
            "ManifestVersion: 1.12.0"
          ) | Set-Content "manifests\FactusConsulting.WhisperDictate.yaml" -Encoding utf8

          @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json',
            "PackageIdentifier: FactusConsulting.WhisperDictate",
            "PackageVersion: $version",
            "PackageLocale: en-US",
            "Publisher: FactusConsulting",
            "PublisherUrl: https://github.com/FactusConsulting",
            "PackageName: whisper-dictate",
            "PackageUrl: https://github.com/$repo",
            "License: MIT",
            "LicenseUrl: https://github.com/$repo/blob/main/LICENSE",
            "ShortDescription: Local push-to-talk dictation -- speak prompts instead of typing them",
            "Description: >-",
            "  App-agnostic push-to-talk dictation. Hold a key, speak quietly but clearly,",
            "  release -- the transcribed text is injected into whatever window has focus.",
            "  Whisper runs fully locally on your own machine; nothing leaves the box.",
            "Tags:",
            "  - dictation",
            "  - speech-to-text",
            "  - whisper",
            "  - voice",
            "  - ai",
            "ManifestType: defaultLocale",
            "ManifestVersion: 1.12.0"
          ) | Set-Content "manifests\FactusConsulting.WhisperDictate.locale.en-US.yaml" -Encoding utf8

          @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json',
            "PackageIdentifier: FactusConsulting.WhisperDictate",
            "PackageVersion: $version",
            "Installers:",
            "  - Architecture: x64",
            "    Scope: user",
            "    InstallerType: inno",
            "    InstallerUrl: $baseUrl/whisper-dictate-windows-setup-$version.exe",
            "    InstallerSha256: $installerHash",
            "    ProductCode: '$productCode'",
            "    InstallerSwitches:",
            "      Silent: /VERYSILENT /SUPPRESSMSGBOXES /NORESTART",
            "    ReleaseDate: $date",
            "    AppsAndFeaturesEntries:",
            "      - DisplayName: whisper-dictate",
            "        Publisher: FactusConsulting",
            "        DisplayVersion: $version",
            "        ProductCode: '$productCode'",
            "ManifestType: installer",
            "ManifestVersion: 1.12.0"
          ) | Set-Content "manifests\FactusConsulting.WhisperDictate.installer.yaml" -Encoding utf8

      - name: Commit updated manifests to main
        if: steps.win-check.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r manifests /tmp/winget-manifests
          git fetch origin main
          git checkout -f main
          cp -r /tmp/winget-manifests/. manifests/
          git add manifests/
          git diff --cached --quiet && echo "no manifest changes" && exit 0
          git commit -m "chore: update winget manifests for $TAG"
          git push origin main
