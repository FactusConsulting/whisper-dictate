name: release

# Cut a release by pushing a version tag:
#   git tag v0.1.1 && git push origin v0.1.1
# (or run this workflow manually from the Actions tab with an existing
# tag). It builds the platform bundles, generates release notes from the
# commit messages since the previous tag, publishes the GitHub Release, and
# builds/uploads the Windows installers.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)release, e.g. v0.1.1'
        required: true

jobs:
  # Gate the entire release on the full test suite (same jobs as CI, reused via
  # workflow_call). A tag must not ship if unit/rust/smoke/lint checks fail.
  tests:
    uses: ./.github/workflows/test.yml
    with:
      # Gate on the tag being shipped. On tag push this equals the workflow ref;
      # on manual workflow_dispatch it is the explicit tag input, not the dispatch branch.
      ref: ${{ github.event.inputs.tag || github.ref_name }}

  release:
    needs: tests
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve tag
        run: |
          if [ "${{ github.event_name }}" = workflow_dispatch ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
          echo "VERSION=${TAG#v}" >> "$GITHUB_ENV"

      - uses: actions/checkout@v6   # v5 = Node 24 (v4/Node 20 is being removed)
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0          # full history + tags for generated release notes

      - name: Sanity-check scripts
        run: |
          python3 -m py_compile src/python/whisper_dictate/*.py
          bash -n scripts/linux/install-rust-ui.sh
          bash -n packaging/linux/ubuntu26.04/setup.sh

      - name: Install Linux Rust UI build deps
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8

      # Cache the dependency build so the optimized release build reuses the
      # crate graph instead of recompiling every dependency from scratch.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> ../target"

      - name: Build Rust desktop UI
        run: cargo build --manifest-path src/rust/Cargo.toml --target-dir target --release -p whisper-dictate-app

      - name: Build bundles
        run: |
          set -e
          mkbundle() {   # $1 zip
            zip_name="$1"
            shift || true
            d=whisper-dictate; rm -rf "$d"; mkdir "$d"
            cp -r docs README.md LICENSE "$d/"
            # Ship only the Python worker package — not src/rust (compiled into
            # the binary) or the test trees. Mirrors the Inno installer's file list.
            mkdir -p "$d/src/python"
            cp -r src/python/whisper_dictate "$d/src/python/"
            # Drop runner-generated bytecode caches (the earlier py_compile step
            # creates them) so the bundle stays reproducible.
            find "$d/src/python" -depth -type d -name __pycache__ -exec rm -rf {} +
            cp -r requirements "$d/"
            mkdir -p "$d/assets"
            cp assets/whisper-dictate-logo.svg "$d/assets/"
            mkdir -p "$d/scripts"
            cp scripts/dev/inject-smoke.py "$d/scripts/"
            cp scripts/linux/install-rust-ui.sh "$d/scripts/"
            mkdir -p "$d/packaging/linux/ubuntu26.04"
            cp packaging/linux/ubuntu26.04/setup.sh "$d/packaging/linux/ubuntu26.04/"
            printf "%s\n" "$VERSION" > "$d/VERSION"
            if [ "${INCLUDE_RUST_UI:-0}" = "1" ]; then
              install -m 0755 target/release/whisper-dictate "$d/whisper-dictate"
            fi
            [ -f "$d/scripts/install-rust-ui.sh" ] && chmod +x "$d/scripts/install-rust-ui.sh"
            zip -q -r "$zip_name" "$d"; rm -rf "$d"
          }
          install -m 0755 target/release/whisper-dictate "whisper-dictate-linux-rust-ui-${VERSION}"
          INCLUDE_RUST_UI=1 mkbundle "whisper-dictate-linux-${VERSION}.zip"

      - name: Generate release notes from commit messages
        run: |
          set -e
          PREV=$(git tag --sort=-v:refname | grep -vFx "$TAG" | head -n1 || true)
          {
            if [ -n "$PREV" ]; then
              echo "## Changes ($PREV → $TAG)"
              echo
              git log --no-merges --pretty='- %s (%h)' "$PREV..$TAG"
            else
              echo "## Changes"
              echo
              git log --no-merges --pretty='- %s (%h)' "$TAG"
            fi
          } > NOTES.md
          echo "----- generated notes -----"; cat NOTES.md

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -e
          assets=(
            "whisper-dictate-linux-${VERSION}.zip"
            "whisper-dictate-linux-rust-ui-${VERSION}"
          )
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
            gh release upload "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create "$TAG" "${assets[@]}" --repo "$GITHUB_REPOSITORY" \
              --title "$TAG — download, unzip, run" --notes-file NOTES.md
          fi

      # NOTE: nix/package.nix is bumped in the pre-release version PR (alongside
      # VERSION), not auto-committed here — main is protected (PR + CI only), so
      # CI must not push to it. See the version-bump PR for each release.

      - name: Bump Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -e
          if [ -z "$HOMEBREW_TAP_TOKEN" ]; then
            echo "HOMEBREW_TAP_TOKEN not set - skipping Homebrew tap bump."
            exit 0
          fi
          asset="whisper-dictate-linux-${VERSION}.zip"
          src="https://github.com/${GITHUB_REPOSITORY}/releases/download/${TAG}/${asset}"
          sha=$(curl -fsSL "$src" | sha256sum | cut -d' ' -f1)
          echo "linux release bundle sha256: $sha"
          git clone --depth 1 \
            "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/FactusConsulting/homebrew-tap.git" tap
          f=tap/Formula/whisper-dictate.rb
          cat > "$f" <<EOF
          class WhisperDictate < Formula
            desc "Local push-to-talk dictation -- speak prompts instead of typing them"
            homepage "https://github.com/FactusConsulting/whisper-dictate"
            url "${src}"
            sha256 "${sha}"
            license "MIT"

            depends_on "portaudio"
            depends_on "python@3.12"

            def install
              payload = Dir["whisper-dictate/*"]
              payload = Dir["*"] if payload.empty?
              libexec.install payload
              chmod 0755, libexec/"whisper-dictate"
              chmod 0755, libexec/"packaging/linux/ubuntu26.04/setup.sh"

              py = Formula["python@3.12"].opt_bin/"python3.12"
            (bin/"whisper-dictate").write <<~SH
              #!/bin/bash
              install_linux_app_icon() {
                local home="\$1"
                local icon_src="#{libexec}/assets/whisper-dictate-logo.svg"
                local icon_path="\$home/.local/share/icons/hicolor/scalable/apps/whisper-dictate.svg"
                [ -n "\$home" ] || return 0
                [ -f "\$icon_src" ] || return 0
                mkdir -p "\$home/.local/share/icons/hicolor/scalable/apps" || return 0
                cp "\$icon_src" "\$icon_path" 2>/dev/null || true
                gtk-update-icon-cache -q "\$home/.local/share/icons/hicolor" 2>/dev/null || true
              }

              repair_linux_desktop_entry() {
                local path="\$1"
                local autostart="\$2"
                local exec_path="#{opt_bin}/whisper-dictate"
                local icon_path="\${HOME:-}/.local/share/icons/hicolor/scalable/apps/whisper-dictate.svg"
                [ -n "\${HOME:-}" ] || return 0
                install_linux_app_icon "\${HOME:-}"
                [ -f "\$path" ] || return 0
                grep -Fq "whisper-dictate" "\$path" || return 0
                if grep -Fq "Exec=\${exec_path} ui" "\$path" &&
                   grep -Fq "Icon=\${icon_path}" "\$path" &&
                   grep -Fq "StartupWMClass=whisper-dictate" "\$path"; then
                  return 0
                fi

                mkdir -p "\$(dirname "\$path")" || return 0
                {
                  printf '%s\\n' '[Desktop Entry]'
                  printf '%s\\n' 'Name=Whisper Dictate'
                  printf '%s\\n' 'Comment=Push-to-talk dictation settings and runtime control'
                  printf 'Exec=%s ui\\n' "\$exec_path"
                  printf 'Icon=%s\\n' "\$icon_path"
                  printf '%s\\n' 'Terminal=false'
                  printf '%s\\n' 'Type=Application'
                  printf '%s\\n' 'Categories=Utility;AudioVideo;Audio;'
                  printf '%s\\n' 'StartupNotify=true'
                  printf '%s\\n' 'StartupWMClass=whisper-dictate'
                  if [ "\$autostart" = "1" ]; then
                    if grep -Fq 'X-GNOME-Autostart-enabled=false' "\$path"; then
                      printf '%s\\n' 'X-GNOME-Autostart-enabled=false'
                    else
                      printf '%s\\n' 'X-GNOME-Autostart-enabled=true'
                    fi
                  fi
                } > "\$path" 2>/dev/null || true
              }

              if [ "\$(uname -s 2>/dev/null)" = "Linux" ]; then
                repair_linux_desktop_entry "\${HOME:-}/.local/share/applications/whisper-dictate.desktop" 0
                repair_linux_desktop_entry "\${HOME:-}/.config/autostart/whisper-dictate.desktop" 1
              fi

              export VOICEPI_BOOTSTRAP_PYTHON="#{py}"
              export VOICEPI_APP_ROOT="#{libexec}"
              export VOICEPI_SKIP_SYSCHECK=1
              exec "#{libexec}/whisper-dictate" "\$@"
            SH
          end

            def post_install
              return unless OS.linux?

              linux_desktop_homes.each do |home|
                install_linux_app_icon(home)
                repair_linux_desktop_entry(
                  Pathname.new(home)/".local/share/applications/whisper-dictate.desktop",
                  opt_bin/"whisper-dictate",
                  false,
                  home,
                )
                repair_linux_desktop_entry(
                  Pathname.new(home)/".config/autostart/whisper-dictate.desktop",
                  opt_bin/"whisper-dictate",
                  true,
                  home,
                )
              end
            end

            def linux_desktop_homes
              homes = [ENV["HOME"], *Dir["/home/*"]]
              homes.compact.uniq.select { |home| File.directory?(home) }
            end

            def repair_linux_desktop_entry(path, exe, autostart, home)
              return unless path.exist?

              raw = path.read
              return unless raw.include?("whisper-dictate")
              icon_path = linux_app_icon_path(home)
              return if raw.include?("Exec=#{exe} ui") &&
                raw.include?("Icon=#{icon_path}") &&
                raw.include?("StartupWMClass=whisper-dictate")

              path.dirname.mkpath
              File.write(path.to_s, <<~DESKTOP)
                [Desktop Entry]
                Name=Whisper Dictate
                Comment=Push-to-talk dictation settings and runtime control
                Exec=#{exe} ui
                Icon=#{icon_path}
                Terminal=false
                Type=Application
                Categories=Utility;AudioVideo;Audio;
                StartupNotify=true
                StartupWMClass=whisper-dictate
                #{autostart ? autostart_enabled_line(raw) : ""}
              DESKTOP
            rescue Errno::EACCES, Errno::EPERM
              nil
            end

            def install_linux_app_icon(home)
              icon_src = libexec/"assets/whisper-dictate-logo.svg"
              return unless icon_src.exist?

              icon_path = linux_app_icon_path(home)
              icon_path.dirname.mkpath
              cp icon_src, icon_path
              quiet_system "gtk-update-icon-cache", "-q", (Pathname.new(home)/".local/share/icons/hicolor").to_s
            rescue Errno::EACCES, Errno::EPERM
              nil
            end

            def linux_app_icon_path(home)
              Pathname.new(home)/".local/share/icons/hicolor/scalable/apps/whisper-dictate.svg"
            end

            def autostart_enabled_line(raw)
              if raw.include?("X-GNOME-Autostart-enabled=false")
                "X-GNOME-Autostart-enabled=false"
              else
                "X-GNOME-Autostart-enabled=true"
              end
            end

            def caveats
              <<~EOS
                whisper-dictate builds a machine-local Python venv on first run
                (~/.venv-whisper-dictate) and downloads the selected STT model.

                Ubuntu 24.04/26.04 Wayland - one-time desktop setup:

                  whisper-dictate setup-ubuntu

                Then start the desktop app:

                  whisper-dictate ui

                Terminal dictation is also available:

                  whisper-dictate run --key ctrl_r --lang da
              EOS
            end

            test do
              assert_path_exists libexec/"src/whisper_dictate/runtime.py"
              assert_path_exists libexec/"whisper-dictate"
              assert_path_exists libexec/"packaging/linux/ubuntu26.04/setup.sh"
              assert_match version.to_s, shell_output("#{bin}/whisper-dictate --version")
            end
          end
          EOF
          cd tap
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/whisper-dictate.rb
          if git diff --cached --quiet; then
            echo "Homebrew formula already up to date."
            exit 0
          fi
          git commit -m "whisper-dictate ${VERSION}"
          git push origin HEAD:main

  windows-installer:
    needs: release
    runs-on: windows-2025
    permissions:
      contents: write
      packages: write
    steps:
      - name: Resolve tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v6
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Check for Windows-relevant changes
        id: win-check
        shell: bash
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$prev" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$prev" HEAD -- \
            src/rust/Cargo.toml src/rust/Cargo.lock src/rust/ \
            src/ \
            requirements/ \
            scripts/ \
            packaging/windows/)
          if [ -n "$changed" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "Windows files changed since $prev:"
            echo "$changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Windows-specific changes since $prev - skipping installer build"
          fi

      - name: Install Inno Setup
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.win-check.outputs.changed == 'true'

      - uses: Swatinem/rust-cache@v2
        if: steps.win-check.outputs.changed == 'true'
        with:
          workspaces: "src/rust -> ../target"

      - name: Build Rust desktop UI
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: cargo build --manifest-path src/rust/Cargo.toml --target-dir target --release -p whisper-dictate-app

      - name: Build installers
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          Set-Content VERSION $version -Encoding ascii
          $iscc    = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $outDir  = "$PWD\Output"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          & $iscc /DVERSION=$version /O"$outDir" packaging\windows\inno\whisper-dictate.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Build Windows ZIP packages
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $outDir = "$PWD\Output"
          $bundle = Join-Path $outDir "zip-windows\whisper-dictate"
          Remove-Item (Split-Path $bundle -Parent) -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $bundle | Out-Null
          # Ship only the Python worker package — not src\rust (compiled into the
          # .exe) or the test trees. Mirrors the Inno installer's [Files] list.
          New-Item -ItemType Directory -Force (Join-Path $bundle "src\python") | Out-Null
          Copy-Item src\python\whisper_dictate (Join-Path $bundle "src\python") -Recurse
          Get-ChildItem -LiteralPath $bundle -Directory -Recurse -Force -Filter '__pycache__' | Remove-Item -Recurse -Force -ErrorAction SilentlyContinue
          Copy-Item README.md,LICENSE,VERSION $bundle
          Copy-Item docs $bundle -Recurse
          Copy-Item requirements $bundle -Recurse
          New-Item -ItemType Directory -Force (Join-Path $bundle "assets") | Out-Null
          Copy-Item assets\whisper-dictate.ico (Join-Path $bundle "assets")
          Copy-Item target\release\whisper-dictate.exe $bundle
          New-Item -ItemType Directory -Force (Join-Path $bundle "scripts") | Out-Null
          Copy-Item scripts\dev\inject-smoke.py (Join-Path $bundle "scripts")
          $zip = Join-Path $outDir "whisper-dictate-windows-$version.zip"
          Remove-Item $zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path (Split-Path $bundle -Parent) "whisper-dictate") -DestinationPath $zip -CompressionLevel Optimal

      - name: Compute SHA256 hashes
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $out = @()
          foreach ($f in Get-ChildItem "Output\*.exe", "Output\*.zip") {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$($f.Name)=$hash" | Tee-Object -Append sha256sums.txt
            $out += [pscustomobject]@{ File = $f.Name; SHA256 = $hash }
          }
          $out | ConvertTo-Json | Set-Content sha256sums.json -Encoding utf8
          Get-Content sha256sums.txt

      - name: Build Chocolatey package
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $repo    = "${{ github.repository }}"
          $tag     = "${{ env.TAG }}"
          $hashes  = Get-Content sha256sums.json | ConvertFrom-Json
          $installerName = "whisper-dictate-windows-setup-$version.exe"
          $installerHash = ($hashes | Where-Object File -eq $installerName).SHA256
          if (-not $installerHash) { throw "Missing SHA256 for $installerName" }

          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          $installerUrl = "$baseUrl/$installerName"
          $packageDir = "Output\chocolatey\whisper-dictate"
          Remove-Item $packageDir -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force "$packageDir\tools" | Out-Null
          Copy-Item packaging\windows\chocolatey\tools\*.ps1 "$packageDir\tools\"

          $nuspec = Get-Content packaging\windows\chocolatey\whisper-dictate.nuspec -Raw
          $nuspec = $nuspec.Replace('__VERSION__', $version)
          Set-Content "$packageDir\whisper-dictate.nuspec" $nuspec -Encoding utf8

          $install = Get-Content "$packageDir\tools\chocolateyinstall.ps1" -Raw
          $install = $install.Replace('__INSTALLER_URL__', $installerUrl)
          $install = $install.Replace('__INSTALLER_SHA256__', $installerHash)
          Set-Content "$packageDir\tools\chocolateyinstall.ps1" $install -Encoding utf8

          choco pack "$packageDir\whisper-dictate.nuspec" --outputdirectory Output
          if ($LASTEXITCODE -ne 0) { throw "choco pack failed" }

      # Fill the winget manifest templates with this release's version, installer
      # URL and SHA256, then ship the concrete manifests as a release asset. This
      # replaces the old manual "bump the winget manifests in a PR" step without
      # pushing to protected main — users install via `winget install --manifest`
      # against the extracted zip.
      - name: Generate winget manifests
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $repo    = "${{ github.repository }}"
          $tag     = "${{ env.TAG }}"
          $hashes  = Get-Content sha256sums.json | ConvertFrom-Json
          $installerName = "whisper-dictate-windows-setup-$version.exe"
          $installerHash = ($hashes | Where-Object File -eq $installerName).SHA256
          if (-not $installerHash) { throw "Missing SHA256 for $installerName" }
          $installerUrl = "https://github.com/$repo/releases/download/$tag/$installerName"
          $releaseDate  = (Get-Date -Format 'yyyy-MM-dd')
          $outDir = "Output\winget"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          foreach ($f in Get-ChildItem packaging\windows\winget\*.yaml) {
            # Drop template comment lines so the generated manifest is clean.
            $body = (Get-Content $f.FullName | Where-Object { $_ -notmatch '^\s*#' }) -join "`n"
            $body = $body.Replace('__VERSION__', $version).
              Replace('__INSTALLER_URL__', $installerUrl).
              Replace('__INSTALLER_SHA256__', $installerHash).
              Replace('__RELEASE_DATE__', $releaseDate)
            Set-Content (Join-Path $outDir $f.Name) $body -Encoding utf8
          }
          $zip = "Output\whisper-dictate-winget-$version.zip"
          Remove-Item $zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path "$outDir\*" -DestinationPath $zip
          Write-Host "Generated winget manifests for $version:"
          Get-ChildItem $outDir | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Upload installers + checksums to release
        if: steps.win-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "$TAG" Output/*.exe Output/*.zip Output/*.nupkg sha256sums.txt --repo "$GITHUB_REPOSITORY" --clobber

      - name: Publish Chocolatey package to GitHub Packages NuGet
        if: steps.win-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $package = Get-ChildItem Output\whisper-dictate.*.nupkg | Select-Object -First 1
          if (-not $package) { throw "Chocolatey package was not built" }
          $source = "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json"
          dotnet nuget push $package.FullName --api-key "$env:GH_TOKEN" --source "$source" --skip-duplicate

      - name: Publish public Chocolatey feed to GitHub Pages
        if: steps.win-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $package = Get-ChildItem Output\whisper-dictate.*.nupkg | Select-Object -First 1
          if (-not $package) { throw "Chocolatey package was not built" }
          .\scripts\windows\publish-chocolatey-feed.ps1 -PackagePath $package.FullName

      - name: Publish Chocolatey package to private NuGet feed
        if: steps.win-check.outputs.changed == 'true'
        env:
          CHOCOLATEY_NUGET_SOURCE: ${{ secrets.CHOCOLATEY_NUGET_SOURCE }}
          CHOCOLATEY_NUGET_API_KEY: ${{ secrets.CHOCOLATEY_NUGET_API_KEY }}
        shell: pwsh
        run: |
          if (-not $env:CHOCOLATEY_NUGET_SOURCE) {
            Write-Host "CHOCOLATEY_NUGET_SOURCE not set - skipping private Chocolatey/NuGet push."
            exit 0
          }
          if (-not $env:CHOCOLATEY_NUGET_API_KEY) {
            Write-Host "CHOCOLATEY_NUGET_API_KEY not set - skipping private Chocolatey/NuGet push."
            exit 0
          }
          $package = Get-ChildItem Output\whisper-dictate.*.nupkg | Select-Object -First 1
          if (-not $package) { throw "Chocolatey package was not built" }
          choco push $package.FullName --source "$env:CHOCOLATEY_NUGET_SOURCE" --api-key "$env:CHOCOLATEY_NUGET_API_KEY" --force
          if ($LASTEXITCODE -ne 0) { throw "choco push failed" }

      # NOTE: winget manifests are generated from the packaging/windows/winget
      # templates in the "Generate winget manifests" step above and shipped as the
      # whisper-dictate-winget-<version>.zip release asset — NOT committed to main
