name: windows-installer

# Manual rebuild of the Windows installer for an existing release tag.
#
# This is a thin wrapper: the actual build (Inno .exe, portable ZIP, Chocolatey
# .nupkg, winget manifests) lives in the reusable
# .github/workflows/windows-installer-build.yml — the SAME workflow the release
# pipeline (.github/workflows/release.yml) calls. There is exactly ONE copy of
# the build steps, so this manual path and the release path can never diverge.
#
# Use this to re-run the installer build against a tag that already has a GitHub
# Release (e.g. after fixing a build issue) without cutting a new tag.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build installer for, e.g. v0.2.22'
        required: true

jobs:
  build-installer:
    permissions:
      contents: write
      packages: write
    uses: ./.github/workflows/windows-installer-build.yml
    with:
      tag: ${{ github.event.inputs.tag }}
      # Manual rebuilds always build (force past the Windows-relevant-changes
      # gate) and always generate the winget manifests, matching this workflow's
      # historical behavior. is_prerelease is left at its 'false' default so the
      # winget-generation step runs (manual rebuilds are treated as finals).
      force_build: true
    secrets:
      CHOCOLATEY_NUGET_SOURCE: ${{ secrets.CHOCOLATEY_NUGET_SOURCE }}
      CHOCOLATEY_NUGET_API_KEY: ${{ secrets.CHOCOLATEY_NUGET_API_KEY }}
