name: windows-installer

# Triggers after the main release workflow creates the GitHub Release.
# Only builds and submits to winget when Windows-relevant files changed.
# Windows-relevant: Rust app, voice_pi.py, vp_*.py, requirements-*.txt, scripts/, installer/

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build installer for, e.g. v0.2.22'
        required: true

jobs:
  build-installer:
    runs-on: windows-2025
    permissions:
      contents: write

    steps:
      - name: Resolve tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "TAG=${{ github.event.inputs.tag }}" >> "$GITHUB_ENV"
          else
            echo "TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          fi

      - uses: actions/checkout@v5
        with:
          ref: ${{ env.TAG }}
          fetch-depth: 0

      - name: Check for Windows-relevant changes
        id: win-check
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$prev" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          changed=$(git diff --name-only "$prev" HEAD -- \
            Cargo.toml Cargo.lock crates/ \
            voice_pi.py 'vp_*.py' \
            requirements-cpu.txt requirements-gpu.txt \
            scripts/ \
            installer/)
          if [ -n "$changed" ]; then
            echo "changed=true"  >> "$GITHUB_OUTPUT"
            echo "Windows files changed since $prev:"
            echo "$changed"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No Windows-specific changes since $prev — skipping build"
          fi

      - name: Install Inno Setup
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: choco install innosetup -y --no-progress

      - uses: dtolnay/rust-toolchain@stable
        if: steps.win-check.outputs.changed == 'true'

      - name: Build Rust desktop UI
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: cargo build --release -p whisper-dictate-app

      - name: Build installers
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          Set-Content VERSION $version -Encoding ascii
          $iscc    = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          $outDir  = "$PWD\Output"
          New-Item -ItemType Directory -Force $outDir | Out-Null
          & $iscc /DVERSION=$version /O"$outDir" installer\whisper-dictate.iss
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed" }

      - name: Build Windows ZIP packages
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $outDir = "$PWD\Output"
          $bundle = Join-Path $outDir "zip-windows\whisper-dictate"
          Remove-Item (Split-Path $bundle -Parent) -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force $bundle | Out-Null
          Copy-Item voice_pi.py $bundle
          Copy-Item vp_*.py $bundle
          Copy-Item README.md,TECHNICAL.md,LICENSE,VERSION $bundle
          Copy-Item dictionary.example.json $bundle -ErrorAction SilentlyContinue
          Copy-Item requirements-parakeet.txt $bundle -ErrorAction SilentlyContinue
          Copy-Item requirements-cpu.txt,requirements-gpu.txt $bundle
          New-Item -ItemType Directory -Force (Join-Path $bundle "assets") | Out-Null
          Copy-Item assets\whisper-dictate.ico (Join-Path $bundle "assets")
          Copy-Item requirements-cpu.txt (Join-Path $bundle "requirements.txt")
          Copy-Item target\release\whisper-dictate.exe $bundle
          New-Item -ItemType Directory -Force (Join-Path $bundle "scripts") | Out-Null
          Copy-Item scripts\inject-smoke.py (Join-Path $bundle "scripts")
          $zip = Join-Path $outDir "whisper-dictate-windows-$version.zip"
          Remove-Item $zip -Force -ErrorAction SilentlyContinue
          Compress-Archive -Path (Join-Path (Split-Path $bundle -Parent) "whisper-dictate") -DestinationPath $zip -CompressionLevel Optimal

      - name: Compute SHA256 hashes
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $out = @()
          foreach ($f in Get-ChildItem "Output\*.exe", "Output\*.zip") {
            $hash = (Get-FileHash $f.FullName -Algorithm SHA256).Hash.ToLower()
            "$($f.Name)=$hash" | Tee-Object -Append sha256sums.txt
            $out += [pscustomobject]@{ File = $f.Name; SHA256 = $hash }
          }
          $out | ConvertTo-Json | Set-Content sha256sums.json -Encoding utf8
          Get-Content sha256sums.txt

      - name: Upload installers + checksums to release
        if: steps.win-check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release upload "$TAG" Output/*.exe Output/*.zip sha256sums.txt --repo "$GITHUB_REPOSITORY" --clobber

      - name: Generate winget manifests
        if: steps.win-check.outputs.changed == 'true'
        shell: pwsh
        run: |
          $version = "${{ env.TAG }}" -replace '^v',''
          $repo    = "${{ github.repository }}"
          $tag     = "${{ env.TAG }}"
          $hashes  = Get-Content sha256sums.json | ConvertFrom-Json

          $installerHash = ($hashes | Where-Object File -eq "whisper-dictate-windows-setup-$version.exe").SHA256

          $baseUrl = "https://github.com/$repo/releases/download/$tag"
          $date    = Get-Date -Format 'yyyy-MM-dd'
          $productCode = '{7B3F8A2C-4E1D-4F9A-B5C6-D2E8F0A1C3B7}_is1'

          New-Item -ItemType Directory -Force manifests | Out-Null

          @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.version.1.12.0.schema.json',
            "PackageIdentifier: FactusConsulting.WhisperDictate",
            "PackageVersion: $version",
            "DefaultLocale: en-US",
            "ManifestType: version",
            "ManifestVersion: 1.12.0"
          ) | Set-Content "manifests\FactusConsulting.WhisperDictate.yaml" -Encoding utf8

          @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.defaultLocale.1.12.0.schema.json',
            "PackageIdentifier: FactusConsulting.WhisperDictate",
            "PackageVersion: $version",
            "PackageLocale: en-US",
            "Publisher: FactusConsulting",
            "PublisherUrl: https://github.com/FactusConsulting",
            "PackageName: whisper-dictate",
            "PackageUrl: https://github.com/$repo",
            "License: MIT",
            "LicenseUrl: https://github.com/$repo/blob/main/LICENSE",
            "ShortDescription: Local push-to-talk dictation -- speak prompts instead of typing them",
            "Description: >-",
            "  App-agnostic push-to-talk dictation. Hold a key, speak quietly but clearly,",
            "  release -- the transcribed text is injected into whatever window has focus.",
            "  Whisper runs fully locally on your own machine; nothing leaves the box.",
            "Tags:",
            "  - dictation",
            "  - speech-to-text",
            "  - whisper",
            "  - voice",
            "  - ai",
            "ManifestType: defaultLocale",
            "ManifestVersion: 1.12.0"
          ) | Set-Content "manifests\FactusConsulting.WhisperDictate.locale.en-US.yaml" -Encoding utf8

          @(
            '# yaml-language-server: $schema=https://aka.ms/winget-manifest.installer.1.12.0.schema.json',
            "PackageIdentifier: FactusConsulting.WhisperDictate",
            "PackageVersion: $version",
            "Installers:",
            "  - Architecture: x64",
            "    Scope: user",
            "    InstallerType: inno",
            "    InstallerUrl: $baseUrl/whisper-dictate-windows-setup-$version.exe",
            "    InstallerSha256: $installerHash",
            "    ProductCode: '$productCode'",
            "    InstallerSwitches:",
            "      Silent: /VERYSILENT /SUPPRESSMSGBOXES /NORESTART",
            "    ReleaseDate: $date",
            "    AppsAndFeaturesEntries:",
            "      - DisplayName: whisper-dictate",
            "        Publisher: FactusConsulting",
            "        DisplayVersion: $version",
            "        ProductCode: '$productCode'",
            "ManifestType: installer",
            "ManifestVersion: 1.12.0"
          ) | Set-Content "manifests\FactusConsulting.WhisperDictate.installer.yaml" -Encoding utf8

      - name: Commit updated manifests to main
        if: steps.win-check.outputs.changed == 'true'
        shell: bash
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          cp -r manifests /tmp/winget-manifests
          git fetch origin main
          git checkout -f main
          cp -r /tmp/winget-manifests/. manifests/
          git add manifests/
          git diff --cached --quiet && echo "no manifest changes" && exit 0
          git commit -m "chore: update winget manifests for $TAG"
          git push origin main
