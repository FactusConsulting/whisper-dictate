name: tests

# Primary CI gate. Runs the full Python + Rust + smoke suite on every push to
# main and every pull request, and is invoked via workflow_call from release.yml
# so a tag never ships if any of these jobs fail.
#
# Required-status-check contexts (per the protected-branch ruleset — do NOT
# rename these job/matrix ids without updating the ruleset):
#   - unit                      (jobs.unit)
#   - lint-workflows            (jobs.lint-workflows)
#   - smoke (ubuntu-latest)     (jobs.smoke matrix)
#   - smoke (windows-2025)      (jobs.smoke matrix)
#   - rust  (ubuntu-latest)     (jobs.rust  matrix)
#   - rust  (windows-2025)      (jobs.rust  matrix)
# The groq-integration job is NOT required (live API; skips without secret).

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:        # allow other workflows (e.g. release) to run the full suite as a gate
    inputs:
      ref:
        description: Git ref to check out for all jobs. Defaults to the triggering ref; the release passes the tag so manual re-releases gate on the shipped commit.
        type: string
        required: false
        default: ''

# Cancel superseded runs on the same PR only. Non-PR events (main pushes, the
# release gate via workflow_call) get a unique group so they're never cancelled
# OR serialized/queued.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Compute which categories of files changed so the heavy jobs (rust matrix,
  # python smoke, unit tests, groq integration) can skip themselves on
  # docs-only PRs and save ~15 minutes of runner time per such PR. The
  # `code` output is true iff anything OUTSIDE the documented exclusion
  # set changed; on push to main / workflow_call we always run (the
  # exclusions are PR-scoped only).
  #
  # Required-status-check semantics:
  # - Non-matrix jobs (`unit`, `groq-integration`) gate via job-level `if:`
  #   — a skipped single-context check is treated as success by branch
  #   protection.
  # - Matrix jobs (`smoke`, `rust`) gate via STEP-LEVEL `if:` so the matrix
  #   still expands and emits each required context name (`rust (ubuntu-latest)`,
  #   `smoke (windows-2025)`, ...). A job-level `if:` would skip BEFORE the
  #   matrix expanded, never creating the required check contexts and
  #   leaving branch protection waiting forever (P2 #398 finding 2).
  changes:
    # `dorny/paths-filter` reads the PR's changed-files list via the GitHub
    # API, which needs `pull-requests: read`. Restricted-token repos default
    # to less than that, so spell it out (P2 #398 finding 3).
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          # `code` = "anything that ISN'T just prose docs/license/gitignore
          # changed". `predicate-quantifier: every` (P2 #398 finding 1) makes
          # negations actually subtract from the match set — under the
          # default `some`, the catch-all `**/*` would match every file
          # regardless of the `!`-patterns and `code` would ALWAYS be true.
          #
          # Exclusion list is intentionally narrow:
          # - `docs/**/*.md` only (NOT `docs/**`) so non-prose assets like
          #   `docs/examples/dictionary.example.json` that the Inno installer
          #   ships still trigger the unit/smoke/Rust checks that validate
          #   packaging — P2 #398 finding 4.
          # - `.github/workflows/**` is deliberately NOT excluded — a
          #   workflow YAML change must exercise the real CI, otherwise we
          #   ship a broken pipeline.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**/*'
              - '!**/*.md'
              - '!docs/**/*.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.editorconfig'
              - '!.gitattributes'

  unit:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install test deps
        run: python -m pip install --quiet pytest numpy
      - name: Run unit tests
        run: python -m pytest src/python/tests src/tests/python -q

  # Live Groq STT + post-processing smoke tests (#37). Non-required: they hit
  # Groq's real API, so a network/quota hiccup must not block merges, and they
  # skip automatically when the GROQ_API_KEY secret is absent (e.g. fork PRs).
  groq-integration:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install test deps
        run: python -m pip install --quiet pytest numpy
      - name: Run Groq integration tests (skipped without the secret)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m pytest src/python/tests/test_groq_integration.py -v

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate workflow YAML
        run: |
          python - <<'EOF'
          import sys, yaml, pathlib
          ok = True
          for p in sorted(pathlib.Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(p.read_text(encoding='utf-8'))
                  print(f'OK   {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL {p}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  smoke:
    # End-to-end import sanity: --help must stay cheap and avoid OS keyboard
    # backends. pynput is installed only for the Windows probe-key step.
    #
    # Job-level `if:` would skip BEFORE the matrix expanded and the
    # required `smoke (ubuntu-latest)` / `smoke (windows-2025)` contexts
    # would never be emitted — branch protection would hang. Step-level
    # `if:` keeps the matrix legs running and each step short-circuits
    # to a no-op on docs-only PRs. P2 #398 finding 2.
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    env:
      RUN_SMOKE: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    steps:
      - if: env.RUN_SMOKE != 'true'
        run: echo "::notice::Skipping smoke matrix leg — no code changes detected"
      - uses: actions/checkout@v6
        if: env.RUN_SMOKE == 'true'
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        if: env.RUN_SMOKE == 'true'
        with:
          python-version: "3.14"
      - name: runtime --help
        if: env.RUN_SMOKE == 'true'
        env:
          PYTHONPATH: src/python
        run: python -m whisper_dictate.runtime --help
      - name: runtime --doctor smoke
        if: env.RUN_SMOKE == 'true'
        env:
          PYTHONPATH: src/python
        run: python -m whisper_dictate.runtime --doctor
        continue-on-error: true
      - name: Install pynput (Windows only)
        if: env.RUN_SMOKE == 'true' && runner.os == 'Windows'
        run: python -m pip install --quiet pynput
      - name: probe-key.py sanity (returns 3 for unknown key)
        # pynput needs a display backend on Linux (Xlib / evdev); the
        # headless Ubuntu runner can't import it, and probe-key.py is
        # primarily a Windows-side tool (Pause/Break, caps_lock toggle
        # warnings, IME chord checks) so skip it there. The Windows
        # runner is the meaningful target.
        if: env.RUN_SMOKE == 'true' && runner.os == 'Windows'
        shell: bash
        run: |
          set +e
          python scripts/dev/probe-key.py bogus_key 1
          rc=$?
          set -e
          if [ "$rc" != "3" ]; then
            echo "expected exit 3 (unknown key), got $rc"
            exit 1
          fi

  rust:
    # See the `smoke` job above for why the matrix gate lives on each
    # step (not on the job-level `if:`): branch protection's required
    # contexts `rust (ubuntu-latest)` / `rust (windows-2025)` only get
    # created when the matrix expands, which a job-level skip prevents.
    # P2 #398 finding 2.
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    env:
      RUN_RUST: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    steps:
      - if: env.RUN_RUST != 'true'
        run: echo "::notice::Skipping rust matrix leg — no code changes detected"
      - uses: actions/checkout@v6
        if: env.RUN_RUST == 'true'
        with:
          ref: ${{ inputs.ref }}
      - name: Install Linux Rust UI build deps
        if: env.RUN_RUST == 'true' && runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxtst-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: env.RUN_RUST == 'true'
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        if: env.RUN_RUST == 'true'
        with:
          workspaces: "src/rust -> ../target"
      - name: Rust format
        if: env.RUN_RUST == 'true'
        run: cargo fmt --manifest-path src/rust/Cargo.toml --all -- --check
      - name: Rust Clippy
        # Everyday CI is glow-only (our shipping renderer) so it stays fast and
        # off the wgpu/DX12 stack. The wgpu exit route is build-validated
        # separately by the periodic renderer-matrix workflow. (Was --all-features,
        # which now also pulls eframe/wgpu via the ui-egui-wgpu feature.)
        if: env.RUN_RUST == 'true'
        run: cargo clippy --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --all-targets --features ui-egui-glow -- -D warnings
      - name: Rust tests
        if: env.RUN_RUST == 'true'
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app
      - name: Rust tests (rust-hotkeys feature)
        # Issue #318: the Rust PTT coordinator is gated behind the
        # `rust-hotkeys` cargo feature. Build & test it on Linux only — rdev's
        # Linux backend needs libxi-dev / libxtst-dev (installed above);
        # Windows already has every dep in the SDK.
        if: env.RUN_RUST == 'true'
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features rust-hotkeys
      - name: Rust CLI smoke
        if: env.RUN_RUST == 'true'
        run: |
          cargo run -q --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- --help
          cargo run -q --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- config path
