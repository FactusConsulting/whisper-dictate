name: tests

# Primary CI gate. Runs the full Python + Rust + smoke suite on every push to
# main and every pull request, and is invoked via workflow_call from release.yml
# so a tag never ships if any of these jobs fail.
#
# Required-status-check contexts (per the protected-branch ruleset — do NOT
# rename these job/matrix ids without updating the ruleset):
#   - unit                      (jobs.unit)
#   - lint-workflows            (jobs.lint-workflows)
#   - smoke (ubuntu-latest)     (jobs.smoke matrix)
#   - smoke (windows-2025)      (jobs.smoke matrix)
#   - rust  (ubuntu-latest)     (jobs.rust  matrix)
#   - rust  (windows-2025)      (jobs.rust  matrix)
# The groq-integration job is NOT required (live API; skips without secret).

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:        # allow other workflows (e.g. release) to run the full suite as a gate
    inputs:
      ref:
        description: Git ref to check out for all jobs. Defaults to the triggering ref; the release passes the tag so manual re-releases gate on the shipped commit.
        type: string
        required: false
        default: ''

# Cancel superseded runs on the same PR only. Non-PR events (main pushes, the
# release gate via workflow_call) get a unique group so they're never cancelled
# OR serialized/queued.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # Compute which categories of files changed so the heavy jobs (rust matrix,
  # python smoke, unit tests, groq integration) can skip themselves on
  # docs-only PRs and save ~15 minutes of runner time per such PR. The
  # `code` output is true iff anything OUTSIDE the documented exclusion
  # set changed; on push to main / workflow_call we always run (the
  # exclusions are PR-scoped only).
  #
  # Required-status-check semantics:
  # - Non-matrix jobs (`unit`, `groq-integration`) gate via job-level `if:`
  #   — a skipped single-context check is treated as success by branch
  #   protection.
  # - Matrix jobs (`smoke`, `rust`) gate via STEP-LEVEL `if:` so the matrix
  #   still expands and emits each required context name (`rust (ubuntu-latest)`,
  #   `smoke (windows-2025)`, ...). A job-level `if:` would skip BEFORE the
  #   matrix expanded, never creating the required check contexts and
  #   leaving branch protection waiting forever (P2 #398 finding 2).
  changes:
    # `dorny/paths-filter` reads the PR's changed-files list via the GitHub
    # API, which needs `pull-requests: read`. Restricted-token repos default
    # to less than that, so spell it out (P2 #398 finding 3).
    permissions:
      contents: read
      pull-requests: read
    runs-on: ubuntu-latest
    outputs:
      # On non-PR triggers (push to main, workflow_call from a tag release)
      # there is no PR-files API to consult and the docs-only skip is not
      # the intent anyway — every job must run. Skip the filter step
      # entirely (see `if:` on the action below) and default the output to
      # `true` so downstream gates evaluate as "real changes present".
      # Before this fallback the release pipeline startup-failed on tag
      # push: the filter step would have nothing to diff against and the
      # downstream `Fail required check` step would fire (P0 follow-up to
      # #398 surfaced by the v1.19.0-rc.1 release attempt).
      code: ${{ steps.filter.outputs.code || 'true' }}
    steps:
      - uses: actions/checkout@v6
        if: github.event_name == 'pull_request'
        with:
          ref: ${{ inputs.ref }}
      # Pin to v4.0.1 (Node 24) — GitHub started defaulting JavaScript
      # actions to Node 24 on June 16, 2026 and the Node 20 runtime is
      # scheduled for removal later in 2026. A Node-20-targeted action
      # could brick the `changes` job once the transition lands, which
      # would skip every required check downstream — P2 #398 follow-up.
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        # PR-scoped only: paths-filter needs the PR-files API for an
        # accurate diff. On a push or workflow_call (release), skip the
        # action and fall through to the `|| 'true'` default above.
        if: github.event_name == 'pull_request'
        with:
          # `code` = "anything that ISN'T just prose docs/license/gitignore
          # changed". `predicate-quantifier: every` makes negations actually
          # subtract from the match set — under the default `some`, the
          # catch-all `**/*` would match every file regardless of the
          # `!`-patterns and `code` would ALWAYS be true.
          #
          # Exclusion list is intentionally narrow:
          # - `!*.md` (top-level only, NOT `**/*.md`) so a change to
          #   `docs/CONFIGURATION.md` keeps triggering the full matrix.
          #   That file is generated by `scripts/dev/gen_settings_docs.py`
          #   and guarded by `src/tests/python/test_settings_docs_generated.py`,
          #   which only runs from the `unit` job — skipping unit on a
          #   manual CONFIGURATION.md edit would let drift merge silently
          #   (P2 #398 follow-up).
          # - Non-prose assets under `docs/` (e.g.
          #   `docs/examples/dictionary.example.json` shipped by the Inno
          #   installer) likewise stay code-relevant.
          # - `.github/workflows/**` is deliberately NOT excluded — a
          #   workflow YAML change must exercise the real CI, otherwise
          #   we ship a broken pipeline.
          predicate-quantifier: 'every'
          filters: |
            code:
              - '**/*'
              - '!*.md'
              - '!LICENSE'
              - '!.gitignore'
              - '!.editorconfig'
              - '!.gitattributes'

  unit:
    needs: changes
    # `if: always()` (not the default) so a `changes` failure/cancel
    # doesn't silently SKIP this required check — branch protection would
    # then let a code PR merge without tests because skipped checks count
    # as success here (P1 #398 follow-up). The first step explicitly
    # fails if `changes` did not succeed; subsequent steps gate on the
    # `code` output via `env.RUN_UNIT` so a docs-only PR still no-ops.
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    env:
      RUN_UNIT: ${{ needs.changes.result == 'success' && (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') }}
    steps:
      - name: Fail required check if change detection broke
        if: needs.changes.result != 'success'
        run: |
          echo "::error::changes job did not succeed (result=${{ needs.changes.result }}); failing required \`unit\` check to avoid silently skipping tests on a code PR"
          exit 1
      - if: env.RUN_UNIT != 'true'
        run: echo "::notice::no code changes detected — skipping unit tests"
      - uses: actions/checkout@v6
        if: env.RUN_UNIT == 'true'
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        if: env.RUN_UNIT == 'true'
        with:
          python-version: "3.14"
      - name: Install test deps
        if: env.RUN_UNIT == 'true'
        run: python -m pip install --quiet pytest numpy
      - name: Run unit tests
        if: env.RUN_UNIT == 'true'
        run: python -m pytest src/python/tests src/tests/python -q

  # Live Groq STT + post-processing smoke tests (#37). Non-required: they hit
  # Groq's real API, so a network/quota hiccup must not block merges, and they
  # skip automatically when the GROQ_API_KEY secret is absent (e.g. fork PRs).
  groq-integration:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' || github.event_name != 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install test deps
        run: python -m pip install --quiet pytest numpy
      - name: Run Groq integration tests (skipped without the secret)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m pytest src/python/tests/test_groq_integration.py -v

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate workflow YAML
        run: |
          python - <<'EOF'
          import sys, yaml, pathlib
          ok = True
          for p in sorted(pathlib.Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(p.read_text(encoding='utf-8'))
                  print(f'OK   {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL {p}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.12
        with:
          args: -color

  smoke:
    # End-to-end import sanity: --help must stay cheap and avoid OS keyboard
    # backends. pynput is installed only for the Windows probe-key step.
    #
    # Job-level `if:` would skip BEFORE the matrix expanded and the
    # required `smoke (ubuntu-latest)` / `smoke (windows-2025)` contexts
    # would never be emitted — branch protection would hang. Step-level
    # `if:` keeps the matrix legs running and each step short-circuits
    # to a no-op on docs-only PRs. P2 #398 finding 2.
    #
    # `if: !cancelled()` (P1 #398 follow-up) so a `changes` failure does
    # NOT silently skip these required matrix legs. The first step then
    # explicitly fails if `changes` did not succeed.
    needs: changes
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    env:
      RUN_SMOKE: ${{ needs.changes.result == 'success' && (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') }}
    steps:
      - name: Fail required check if change detection broke
        if: needs.changes.result != 'success'
        run: |
          echo "::error::changes job did not succeed (result=${{ needs.changes.result }}); failing required \`smoke\` matrix leg to avoid silently skipping tests on a code PR"
          exit 1
      - if: env.RUN_SMOKE != 'true'
        run: echo "::notice::Skipping smoke matrix leg — no code changes detected"
      - uses: actions/checkout@v6
        if: env.RUN_SMOKE == 'true'
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        if: env.RUN_SMOKE == 'true'
        with:
          python-version: "3.14"
      - name: runtime --help
        if: env.RUN_SMOKE == 'true'
        env:
          PYTHONPATH: src/python
        run: python -m whisper_dictate.runtime --help
      - name: runtime --doctor smoke
        if: env.RUN_SMOKE == 'true'
        env:
          PYTHONPATH: src/python
        run: python -m whisper_dictate.runtime --doctor
        continue-on-error: true
      - name: Install pynput (Windows only)
        if: env.RUN_SMOKE == 'true' && runner.os == 'Windows'
        run: python -m pip install --quiet pynput
      - name: probe-key.py sanity (returns 3 for unknown key)
        # pynput needs a display backend on Linux (Xlib / evdev); the
        # headless Ubuntu runner can't import it, and probe-key.py is
        # primarily a Windows-side tool (Pause/Break, caps_lock toggle
        # warnings, IME chord checks) so skip it there. The Windows
        # runner is the meaningful target.
        if: env.RUN_SMOKE == 'true' && runner.os == 'Windows'
        shell: bash
        run: |
          set +e
          python scripts/dev/probe-key.py bogus_key 1
          rc=$?
          set -e
          if [ "$rc" != "3" ]; then
            echo "expected exit 3 (unknown key), got $rc"
            exit 1
          fi

  rust:
    # See the `smoke` job above for why the matrix gate lives on each
    # step (not on the job-level `if:`): branch protection's required
    # contexts `rust (ubuntu-latest)` / `rust (windows-2025)` only get
    # created when the matrix expands, which a job-level skip prevents.
    # `if: !cancelled()` (P1 #398 follow-up) keeps these legs running
    # even when `changes` failed so the first step can fail explicitly
    # instead of silently skipping required checks.
    needs: changes
    if: ${{ !cancelled() }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    env:
      RUN_RUST: ${{ needs.changes.result == 'success' && (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') }}
    steps:
      - name: Fail required check if change detection broke
        if: needs.changes.result != 'success'
        run: |
          echo "::error::changes job did not succeed (result=${{ needs.changes.result }}); failing required \`rust\` matrix leg to avoid silently skipping tests on a code PR"
          exit 1
      - if: env.RUN_RUST != 'true'
        run: echo "::notice::Skipping rust matrix leg — no code changes detected"
      - uses: actions/checkout@v6
        if: env.RUN_RUST == 'true'
        with:
          ref: ${{ inputs.ref }}
      - name: Install Linux Rust UI build deps
        if: env.RUN_RUST == 'true' && runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libxi-dev \
            libxtst-dev \
            libasound2-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: env.RUN_RUST == 'true'
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        if: env.RUN_RUST == 'true'
        with:
          workspaces: "src/rust -> ../target"
      - name: Rust format
        if: env.RUN_RUST == 'true'
        run: cargo fmt --manifest-path src/rust/Cargo.toml --all -- --check
      - name: Rust Clippy
        # Everyday CI is glow-only (our shipping renderer) so it stays fast and
        # off the wgpu/DX12 stack. The wgpu exit route is build-validated
        # separately by the periodic renderer-matrix workflow. (Was --all-features,
        # which now also pulls eframe/wgpu via the ui-egui-wgpu feature.)
        if: env.RUN_RUST == 'true'
        run: cargo clippy --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --all-targets --features ui-egui-glow -- -D warnings
      - name: Rust tests
        if: env.RUN_RUST == 'true'
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app
      - name: Rust tests (rust-hotkeys feature)
        # Issue #318: the Rust PTT coordinator is gated behind the
        # `rust-hotkeys` cargo feature. Build & test it on Linux only — rdev's
        # Linux backend needs libxi-dev / libxtst-dev (installed above);
        # Windows already has every dep in the SDK.
        if: env.RUN_RUST == 'true'
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features rust-hotkeys
      - name: Rust tests (audio-in-rust feature)
        # Issue #316 / Wave 4-C: the Rust audio pipeline (cpal capture ->
        # rubato resample -> Silero VAD via vad-rs/ort) is gated behind
        # the `audio-in-rust` cargo feature. Build & test on BOTH
        # platforms because cpal's WASAPI (Windows) and ALSA (Linux)
        # backends are different code paths. ort-sys is pinned in
        # Cargo.toml to a vad-rs-compatible version; this step
        # verifies the pinned combination still links cleanly on both
        # runners. Prep step for flipping the feature into the shipping
        # installer (Wave 8 follow-up).
        if: env.RUN_RUST == 'true'
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features audio-in-rust
      - name: Rust build (whisper-rs-local feature)
        # rc.2 of Wave 8 (#348): the `whisper-rs-local` feature compiles
        # whisper.cpp from source via whisper-rs and is now shipping in
        # the release installer. Build-only (not `cargo test`) because
        # whisper-rs's own integration tests want a GGML model fixture
        # we don't ship; this step just confirms the C++/Rust link
        # boundary still compiles on both runners. Without this gate the
        # release pipeline (which builds `--features ...,whisper-rs-local`)
        # would be the first place a whisper-rs API break surfaces, and
        # that's too late.
        if: env.RUN_RUST == 'true'
        run: cargo build --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features whisper-rs-local --release
      - name: Rust CLI smoke
        if: env.RUN_RUST == 'true'
        run: |
          cargo run -q --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- --help
          cargo run -q --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- config path
      - name: injection-idempotency regression test (self-test)
        # Codex #518 F6: the ubuntu 26.04 integration job runs this same
        # verb on Linux (see `integration-ubuntu-2604` below), but the
        # bug class this catches — modifier state leakage on the
        # SendInput path — is *Windows*-specific. Running the harness on
        # both matrix legs (ubuntu-latest + windows-2025) exercises the
        # `enigo` backend on the Windows runner where a stuck-Shift
        # regression would actually surface.
        #
        # Default dry-run: no OS side effects on either matrix leg, so
        # this is safe under `-D warnings` alongside every other rust
        # step. NO `|| true` — a real regression here MUST fail CI.
        if: env.RUN_RUST == 'true'
        run: cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features rust-hotkeys,rust-injection -- self-test injection-idempotency --iterations 10 --json

  integration-ubuntu-2604:
    # Runs the Rust + Python test suites inside a purpose-built Ubuntu
    # 26.04 container (docker/ci-ubuntu2604/Dockerfile) so we get one
    # environment that matches what users will be on when 26.04 becomes
    # the default LTS. NOT a required check yet — informational until we
    # have a few green runs. To promote to required: add
    # `integration-ubuntu-2604` to the protected-branch ruleset and add
    # this line to the required-status list header comment at the top of
    # this file.
    #
    # Bootstrap-friendly image resolution: `docker pull` first (fast when
    # `.github/workflows/build-ci-images.yml` has published the image on
    # a prior merge), fall back to `docker build` when the tag doesn't
    # exist yet. This keeps the very first PR (which introduces the
    # container) exercising the same Dockerfile it will publish once
    # merged, without a chicken-and-egg on the registry.
    needs: changes
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    env:
      RUN_INTEG: ${{ needs.changes.result == 'success' && (needs.changes.outputs.code == 'true' || github.event_name != 'pull_request') }}
      IMAGE: ghcr.io/factusconsulting/whisper-dictate-ci-ubuntu2604:latest
    steps:
      - name: Skip on docs-only PRs
        if: env.RUN_INTEG != 'true'
        run: echo "::notice::Skipping ubuntu 26.04 integration — no code changes detected"
      - uses: actions/checkout@v6
        if: env.RUN_INTEG == 'true'
        with:
          ref: ${{ inputs.ref }}
      - name: Log in to GHCR (pull only)
        if: env.RUN_INTEG == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve container image (pull or build)
        if: env.RUN_INTEG == 'true'
        run: |
          set -euxo pipefail
          if docker pull "$IMAGE"; then
            echo "using published image"
          else
            echo "image not yet published, building inline from docker/ci-ubuntu2604/"
            docker build -t "$IMAGE" docker/ci-ubuntu2604/
          fi
      - name: Rust tests inside container
        if: env.RUN_INTEG == 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app"
      - name: Python tests inside container
        # Only src/tests/python for now — the same set the required `unit`
        # job runs. `src/python/tests` (runtime-package tests under
        # src/python/whisper_dictate/) needs the full STT stack
        # (faster-whisper, sounddevice, pynput, ...) which is NOT baked
        # into the CI image on purpose (keeps size down). Adding those
        # via `pip install -r requirements/cpu.txt` before pytest is a
        # follow-up once we know the container path is stable.
        if: env.RUN_INTEG == 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "python3.14 -m pytest src/tests/python -q"
      - name: CLI smoke (models list) inside container
        if: env.RUN_INTEG == 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- models list"
      - name: CLI smoke (--version) inside container
        if: env.RUN_INTEG == 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- --version"
      - name: PTT-wedge regression test (self-test)
        # Regression coverage for the v1.20.7 (Windows) / v1.20.2 (Wayland,
        # #467) push-to-talk wedge class of bugs — the headless harness added
        # in #510 exercises the shared `hotkey::inject_guard` + tracker filter
        # both drivers converge on, with a burst of synthetic self-injected
        # events representative of the v1.20.7 wedge. Feature-gated behind
        # `rust-hotkeys,rust-injection`; the Ubuntu 26.04 CI image bakes in
        # every dep both features need (rdev via libxi-dev/libxtst-dev,
        # evdev is pure-Rust, enigo pulls only crates already covered).
        # NO `|| true` — a real regression here MUST fail CI. Iteration
        # count intentionally >=5 so intermittent races cannot slip past.
        if: env.RUN_INTEG == 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features rust-hotkeys,rust-injection -- self-test ptt-wedge --iterations 5 --json"
      - name: injection-idempotency regression test (self-test)
        # Sibling of ptt-wedge, different bug class: this verb probes
        # INJECTION-side state accumulation (plan-builder determinism,
        # guard bracket counter, backend-selection cache) instead of the
        # hotkey tracker. Default dry-run — no OS side effects — so it's
        # safe in this container. Iteration count intentionally >=10
        # (higher than ptt-wedge) so intermittent state leaks are more
        # likely to surface. Same feature-gate as ptt-wedge.
        # NO `|| true` — a real regression here MUST fail CI.
        if: env.RUN_INTEG == 'true'
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features rust-hotkeys,rust-injection -- self-test injection-idempotency --iterations 10 --json"
      - name: audio-capture self-test (audio-in-rust — item 5 prereq 4)
        # Exercises the cpal capture path AND the PipeWire quantum lesson
        # from v1.20.6 (`PIPEWIRE_QUANTUM=2048` when unset). Feature-gated
        # behind `audio-in-rust`; the Ubuntu 26.04 CI image bakes in
        # libasound2-dev so cpal's ALSA backend links.
        #
        # `continue-on-error: true` because the CI container almost never
        # has an audio device wired to a working ALSA loopback — the
        # verb's `AudioCaptureReport::error` will say "no audio device
        # delivered samples" and exit 1. We swallow that non-zero exit
        # rather than the useful signal (a v1.20.6-class regression
        # would surface as either a compile error above OR the verb
        # panicking mid-run, both of which trip the step). When a
        # future CI runner gets an ALSA loopback, promote this back to
        # a hard fail and drop `continue-on-error`.
        if: env.RUN_INTEG == 'true'
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features audio-in-rust -- self-test audio-capture --duration-ms 500 --json || echo '::notice::audio-capture self-test exited non-zero (expected without a live audio device in the CI container)'"
      - name: whisper-load regression test (self-test)
        # Item 5 prereq 5 (Whisper cold-load latency + OOM). The self-test
        # loads a GGML model through the same background preloader the
        # supervisor will use in Phase C step 2, catching any regression
        # in the whisper-rs API surface, the whisper.cpp OOM behaviour,
        # or the preloader wiring BEFORE it ships to users. Downloads
        # tiny.en (~78 MB) into the runner-scoped cache first — we
        # deliberately don't bake the model into the CI image (see
        # docker/ci-ubuntu2604/README for the "no models baked in"
        # rationale). Combined `--features whisper-rs-local,rust-hotkeys,
        # rust-injection` so this shares the previous step's compile
        # artifacts and doesn't pay a second cold cargo build.
        #
        # continue-on-error: the HuggingFace fetch can flake in CI
        # (rate-limits, transient 5xx) — the ubuntu-2604 job is still
        # informational until model download reliability is proven; a
        # failing tiny.en fetch shouldn't red-X the whole matrix leg.
        # Promote to a hard failure (remove the flag) once model download
        # has ≥50 consecutive green runs.
        if: env.RUN_INTEG == 'true'
        continue-on-error: true
        run: |
          docker run --rm -v "${{ github.workspace }}:/workspace" -w /workspace "$IMAGE" \
            bash -c "cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features whisper-rs-local,rust-hotkeys,rust-injection -- models download tiny.en && cargo run --release --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --features whisper-rs-local,rust-hotkeys,rust-injection -- self-test whisper-load --model tiny.en --json"
