name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_call:        # allow other workflows (e.g. release) to run the full suite as a gate
    inputs:
      ref:
        description: Git ref to check out for all jobs. Defaults to the triggering ref; the release passes the tag so manual re-releases gate on the shipped commit.
        type: string
        required: false
        default: ''

# Cancel superseded runs on the same PR only. Non-PR events (main pushes, the
# release gate via workflow_call) get a unique group so they're never cancelled
# OR serialized/queued.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --quiet pytest numpy
      - name: Run unit tests
        run: python -m pytest src/python/tests src/tests/python -q

  # Live Groq STT + post-processing smoke tests (#37). Non-required: they hit
  # Groq's real API, so a network/quota hiccup must not block merges, and they
  # skip automatically when the GROQ_API_KEY secret is absent (e.g. fork PRs).
  groq-integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --quiet pytest numpy
      - name: Run Groq integration tests (skipped without the secret)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python -m pytest src/python/tests/test_groq_integration.py -v

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate workflow YAML
        run: |
          python - <<'EOF'
          import sys, yaml, pathlib
          ok = True
          for p in sorted(pathlib.Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(p.read_text(encoding='utf-8'))
                  print(f'OK   {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL {p}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  smoke:
    # End-to-end import sanity: --help must stay cheap and avoid OS keyboard
    # backends. pynput is installed only for the Windows probe-key step.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: runtime --help
        env:
          PYTHONPATH: src/python
        run: python -m whisper_dictate.runtime --help
      - name: runtime --doctor smoke
        env:
          PYTHONPATH: src/python
        run: python -m whisper_dictate.runtime --doctor
        continue-on-error: true
      - name: Install pynput (Windows only)
        if: runner.os == 'Windows'
        run: python -m pip install --quiet pynput
      - name: probe-key.py sanity (returns 3 for unknown key)
        # pynput needs a display backend on Linux (Xlib / evdev); the
        # headless Ubuntu runner can't import it, and probe-key.py is
        # primarily a Windows-side tool (Pause/Break, caps_lock toggle
        # warnings, IME chord checks) so skip it there. The Windows
        # runner is the meaningful target.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set +e
          python scripts/dev/probe-key.py bogus_key 1
          rc=$?
          set -e
          if [ "$rc" != "3" ]; then
            echo "expected exit 3 (unknown key), got $rc"
            exit 1
          fi

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
      - name: Install Linux Rust UI build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> ../target"
      - name: Rust format
        run: cargo fmt --manifest-path src/rust/Cargo.toml --all -- --check
      - name: Rust Clippy
        run: cargo clippy --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --all-targets --all-features -- -D warnings
      - name: Rust tests
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app
      - name: Rust CLI smoke
        run: |
          cargo run -q --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- --help
          cargo run -q --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app -- config path

      # SPIKE (spike/egui-wgpu-renderer): launch the GUI headless on the
      # GPU-less windows-2025 runner to see whether the wgpu renderer can
      # initialise a DX12/Vulkan adapter at runtime — the decisive question
      # the existing install-smoke (--version / config path) never exercises,
      # because those return before eframe::run_native. A debug build keeps the
      # console subsystem so wgpu's stderr (incl. adapter enumeration / "No
      # suitable GPU adapters found" panic) is captured. REMOVE before merge.
      - name: Rust GUI wgpu adapter probe (SPIKE, Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "target\debug\whisper-dictate.exe"
          if (-not (Test-Path $exe)) { throw "debug exe missing at $exe" }
          $log = "wgpu-probe.log"
          # RUST_LOG=wgpu so adapter enumeration is logged; backtrace on panic.
          $env:RUST_LOG = "wgpu_core=info,wgpu_hal=info,eframe=info,egui_wgpu=info"
          $env:RUST_BACKTRACE = "1"
          Write-Host "Launching GUI (Ui command) headless; capturing stderr -> $log"
          $p = Start-Process -FilePath $exe -ArgumentList 'ui' `
                 -RedirectStandardError $log -RedirectStandardOutput "wgpu-probe.out" `
                 -PassThru -WindowStyle Hidden
          # Give wgpu time to enumerate + request an adapter and create a device.
          Start-Sleep -Seconds 30
          $exited = $p.HasExited
          if ($exited) {
            $code = $p.ExitCode
            Write-Host "Process EXITED early with code $code (window did not stay open)"
          } else {
            Write-Host "Process STILL RUNNING after 30s (window stayed open) — killing it"
            Stop-Process -Id $p.Id -Force
          }
          Write-Host "===== wgpu-probe stderr ====="
          if (Test-Path $log) { Get-Content $log } else { Write-Host "(no stderr)" }
          Write-Host "===== wgpu-probe stdout ====="
          if (Test-Path "wgpu-probe.out") { Get-Content "wgpu-probe.out" } else { Write-Host "(no stdout)" }
          Write-Host "============================="
          $err = if (Test-Path $log) { Get-Content $log -Raw } else { "" }
          # Decisive failure signatures for headless wgpu adapter init.
          $adapterFail = $err -match 'No suitable GPU adapters|RequestAdapterError|NoAdapter|Failed to (create|find).*(adapter|device)|wgpu error'
          if ($exited -and $p.ExitCode -ne 0) {
            if ($adapterFail) {
              throw "SPIKE FINDING: wgpu FAILED to initialise a GPU adapter headless (exit $($p.ExitCode)). This is the decisive runtime blocker — glow passed here."
            }
            throw "GUI exited early with code $($p.ExitCode) — see stderr above."
          }
          if ($adapterFail) {
            throw "SPIKE FINDING: wgpu adapter-init error logged headless even though the process survived — investigate stderr above."
          }
          Write-Host "SPIKE FINDING: wgpu initialised an adapter headless OK (no adapter-init failure; window opened)."
