name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test deps
        run: python -m pip install --quiet numpy
      - name: Run unit tests
        run: python -m unittest discover -s tests -v

  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install PyYAML
        run: python -m pip install --quiet pyyaml
      - name: Validate workflow YAML
        run: |
          python - <<'EOF'
          import sys, yaml, pathlib
          ok = True
          for p in sorted(pathlib.Path('.github/workflows').glob('*.yml')):
              try:
                  yaml.safe_load(p.read_text(encoding='utf-8'))
                  print(f'OK   {p}')
              except yaml.YAMLError as e:
                  print(f'FAIL {p}: {e}')
                  ok = False
          sys.exit(0 if ok else 1)
          EOF
      - name: actionlint
        uses: docker://rhysd/actionlint:1.7.7
        with:
          args: -color

  smoke:
    # End-to-end import sanity: --help must stay cheap and avoid OS keyboard
    # backends. pynput is installed only for the Windows probe-key step.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: voice_pi --help
        run: python voice_pi.py --help
      - name: voice_pi --doctor smoke
        run: python voice_pi.py --doctor
        continue-on-error: true
      - name: Install pynput (Windows only)
        if: runner.os == 'Windows'
        run: python -m pip install --quiet pynput
      - name: probe-key.py sanity (returns 3 for unknown key)
        # pynput needs a display backend on Linux (Xlib / evdev); the
        # headless Ubuntu runner can't import it, and probe-key.py is
        # primarily a Windows-side tool (Pause/Break, caps_lock toggle
        # warnings, IME chord checks) so skip it there. The Windows
        # runner is the meaningful target.
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set +e
          python scripts/probe-key.py bogus_key 1
          rc=$?
          set -e
          if [ "$rc" != "3" ]; then
            echo "expected exit 3 (unknown key), got $rc"
            exit 1
          fi

  rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - name: Install Linux Rust UI build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt update
          sudo apt install -y \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev
      - uses: dtolnay/rust-toolchain@stable
      - name: Rust format
        run: cargo fmt --all -- --check
      - name: Rust tests
        run: cargo test -p whisper-dictate-app
      - name: Rust CLI smoke
        run: |
          cargo run -q -p whisper-dictate-app -- --help
          cargo run -q -p whisper-dictate-app -- config path
