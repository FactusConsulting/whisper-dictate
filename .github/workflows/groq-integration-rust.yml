name: groq-integration-rust

on:
  push:
    branches: [main]
    paths: ['src/rust/**', 'scripts/integration/groq-cli-smoke.sh', 'src/python/tests/fixtures/hello.wav', '.github/workflows/groq-integration-rust.yml']
  pull_request:
    paths: ['src/rust/**', 'scripts/integration/groq-cli-smoke.sh', 'src/python/tests/fixtures/hello.wav', '.github/workflows/groq-integration-rust.yml']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  groq-integration-rust:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-2025]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/rust
      - name: Groq cloud-STT integration test (real hello.wav)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: cargo test --manifest-path src/rust/Cargo.toml --target-dir src/rust/target --test groq_cloud_stt -- --nocapture
      - name: Groq CLI chain smoke (cloud-transcribe -> postprocess -> format)
        shell: bash
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: bash scripts/integration/groq-cli-smoke.sh
