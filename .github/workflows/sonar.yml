name: sonar

# Runs Sonar (Clippy JSON + Rust LCOV) on every push to
# main and every pull request. Uploads results to SonarCloud.
#
# Required-status-check context: NONE in the protected-branch ruleset. The
# SonarCloud Quality Gate appears as its own external check on PRs and is
# tracked separately (see [[sonarcloud-quality-gate]] in user memory).

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name == 'pull_request' && 'pr' || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  sonar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install Linux Rust UI build deps
        run: |
          sudo apt update
          sudo apt install -y \
            pkg-config \
            libdbus-1-dev \
            libwayland-dev \
            libx11-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev

      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          components: clippy, llvm-tools-preview

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src/rust -> ../target"

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Rust Clippy report (JSON for Sonar import)
        # No -D warnings here: emit the report even when lints fire so Sonar can
        # surface them as issues. The hard clippy gate lives in test.yml's rust job.
        # Glow-only (our shipping renderer): keeps Sonar off the wgpu/DX12 stack;
        # the wgpu exit route is build-validated by the renderer-matrix workflow.
        run: cargo clippy --manifest-path src/rust/Cargo.toml --target-dir target -p whisper-dictate-app --all-targets --features ui-egui-glow --message-format=json > clippy-report.json

      - name: Rust coverage (LCOV for Sonar import)
        # Run the package test suite under instrumentation and emit LCOV.
        # cargo-llvm-cov manages its own instrumented build tree
        # (target/llvm-cov-target) and rejects a top-level --target-dir, so we
        # leave that to its default. Use an absolute --output-path so the report
        # always lands at the repo root regardless of how cargo-llvm-cov resolves
        # a relative output path.
        run: cargo llvm-cov --manifest-path src/rust/Cargo.toml -p whisper-dictate-app --features ui-egui-glow --lcov --output-path "$GITHUB_WORKSPACE/lcov.info"

      - name: Normalize LCOV source paths to repo root
        # Sonar resolves LCOV `SF:` paths against the project base dir, so they
        # must be repo-root-relative. cargo-llvm-cov may emit absolute paths
        # (strip the workspace prefix) or crate-root-relative ones (the crate is
        # flat under src/rust, so those start with e.g. lib.rs — prefix src/rust/).
        # Both seds are idempotent no-ops when the path is already normalized.
        run: |
          sed -i "s#^SF:$(pwd)/#SF:#" lcov.info
          sed -i -E "/^SF:src\//! s#^SF:#SF:src/rust/#" lcov.info
          # Sanity check: confirm the report has source records with repo-root paths.
          echo "LCOV SF records: $(grep -c '^SF:' lcov.info), sample: $(grep -m1 '^SF:' lcov.info)"

      - name: SonarQube Scan
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: SonarSource/sonarqube-scan-action@v8
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
